<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Dashboard praticien - Pelvis Pain Map</title><link rel='stylesheet' href='style.css'><script src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js'></script><script src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'></script><script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script><script src='firebase-config.js'></script></head><body>
<div id='pinOverlay' class='pinOverlay'><div class='pinCard'><h2>Accès Dashboard praticien</h2><label for='practitionerLogin'>Praticien</label><select id='practitionerLogin' class='pinInput'><option value='alexandre_soum'>Alexandre Soum</option><option value='praticien_2'>Praticien 2</option><option value='praticien_3'>Praticien 3</option></select><label for='pinInput'>Code PIN</label><input type='password' id='pinInput' maxlength='4' class='pinInput' placeholder='Code PIN'><button class='primary' onclick='checkPractitionerPin()'>Entrer</button><p id='pinError' class='pinError'></p></div></div>
<div id='dashboardContent' style='display:none;'><header class='header'><h1>Dashboard Pelvis Pain Map</h1><p class='info' id='dashboardSubtitle'>Vue praticien</p></header><div class='container wide'><div class='toolbar toolbarTop'><input type='text' id='searchInput' class='searchInput' placeholder='Rechercher...' oninput='applyFiltersAndSort()'><select id='sortSelect' class='sortSelect' onchange='applyFiltersAndSort()'><option value='date_desc'>Trier par date ↓</option><option value='date_asc'>Trier par date ↑</option><option value='pain_desc'>Trier par intensité ↓</option><option value='pain_asc'>Trier par intensité ↑</option><option value='nom_asc'>Trier par nom A → Z</option><option value='nom_desc'>Trier par nom Z → A</option></select><button class='statsBtn' onclick='openStatsPage()'>Stats</button></div><div class='card'><h2>Résultats patientes</h2><div class='tableWrap'><table><thead><tr><th>Date</th><th>Nom</th><th>Prénom</th><th>Date de naissance</th><th>Intensité</th><th>Localisation</th><th>Quand</th><th>Digestif</th><th>Contraception</th><th>Phénotype</th><th>Endométriose</th><th>Adénomyose</th><th>Pudendal</th><th>Congestion</th><th>Résultats écho</th><th>Certitude</th><th>PDF</th><th>Supprimer</th></tr></thead><tbody id='tableBody'></tbody></table></div></div></div></div>
<script>
const PRACTITIONER_PINS={alexandre_soum:atob('MTYxMg=='),praticien_2:atob('MjIyMg=='),praticien_3:atob('MzMzMw==')};const PRACTITIONER_LABELS={alexandre_soum:'Alexandre Soum',praticien_2:'Praticien 2',praticien_3:'Praticien 3'};const echoOptions=['Endométriose','Adénomyose','Névralgie pudendale','Congestion pelvienne','Normal / non contributif','Mixte'];const certaintyOptions=['Non renseigné','Suspect','Compatible','Confirmé'];let currentPractitioner=null,allPatients=[];function contraceptionText(d){if(!d.contraceptionType)return '';if(d.contraceptionType==='Pilule'&&d.pillContinuous)return d.contraceptionType+' - en continu : '+d.pillContinuous;return d.contraceptionType;}function checkPractitionerPin(){const pid=document.getElementById('practitionerLogin').value,pin=document.getElementById('pinInput').value;if(pin===PRACTITIONER_PINS[pid]){currentPractitioner=pid;sessionStorage.setItem('ppm_currentPractitioner',pid);document.getElementById('pinOverlay').style.display='none';document.getElementById('dashboardContent').style.display='block';document.getElementById('dashboardSubtitle').innerText='Vue praticien – '+PRACTITIONER_LABELS[pid];loadPatients();}else{document.getElementById('pinError').innerText='Code incorrect.';}}function openStatsPage(){if(currentPractitioner)sessionStorage.setItem('ppm_currentPractitioner',currentPractitioner);window.location.href='doctor-stats.html';}function fmtDate(d){if(!d)return '';try{if(d.seconds)return new Date(d.seconds*1000).toLocaleString();return new Date(d).toLocaleString()}catch(e){return ''}}function toTimestampValue(d){if(!d)return 0;try{if(d.seconds)return d.seconds;return new Date(d).getTime()/1000}catch(e){return 0}}function pdfDataFromDoc(d){return {nom:d.nom||'',prenom:d.prenom||'',dob:d.dob||'',pain:d.pain||'',topo:Array.isArray(d.topo)?d.topo:[],time:Array.isArray(d.time)?d.time:[],digestif:Array.isArray(d.digestif)?d.digestif:[],contraceptionType:d.contraceptionType||'',pillContinuous:d.pillContinuous||'',dateText:fmtDate(d.date),practitionerName:d.practitionerName||'',diagnostic_echo:Array.isArray(d.diagnostic_echo)?d.diagnostic_echo:[],echoCertainty:d.echoCertainty||'Non renseigné'}}function buildPdf(doc,d){let y=20;const line=t=>{const s=doc.splitTextToSize(t,170);doc.text(s,20,y);y+=s.length*7+3};doc.setFontSize(16);doc.text('Pelvis Pain Map - Résultat questionnaire',20,y);y+=12;doc.setFontSize(11);line('Date : '+d.dateText);line('Praticien : '+(d.practitionerName||''));line('Patiente : '+d.prenom+' '+d.nom);line('Date de naissance : '+(d.dob||'Non renseignée'));line('Intensité : '+d.pain+'/10');line('Localisation : '+(d.topo.join(', ')||'Non renseignée'));line('Quand : '+(d.time.join(', ')||'Non renseignée'));line('Signes digestifs : '+(d.digestif.join(', ')||'Aucun'));line('Contraception : '+((d.contraceptionType||'')?(d.contraceptionType==='Pilule'&&d.pillContinuous?d.contraceptionType+' - en continu : '+d.pillContinuous:d.contraceptionType):'Non renseignée'));line('Résultats écho : '+(d.diagnostic_echo.join(', ')||'Non renseigné'));line('Certitude : '+(d.echoCertainty||'Non renseigné'))}function generateDoctorPDF(encoded){const d=JSON.parse(decodeURIComponent(encoded));const {jsPDF}=window.jspdf;const doc=new jsPDF();buildPdf(doc,d);doc.save('pelvis_pain_map_'+(d.prenom||'')+'_'+(d.nom||'patiente')+'.pdf')}function getEchoSelection(id){return [...document.querySelectorAll('.echo-group[data-id="'+id+'"] input[type="checkbox"]:checked')].map(el=>el.value)}async function updateEchoSelection(id){await db.collection('patients').doc(id).update({diagnostic_echo:getEchoSelection(id)})}async function updateEchoCertainty(id,v){await db.collection('patients').doc(id).update({echoCertainty:v})}async function deletePatient(id,name){if(!confirm('Supprimer cette fiche : '+name+' ?'))return;await db.collection('patients').doc(id).delete()}function renderEchoCheckboxes(id,sel){const cur=Array.isArray(sel)?sel:[];return `<div class="echo-group" data-id="${id}">${echoOptions.map(o=>`<label class="echoItem"><input type="checkbox" value="${o}" ${cur.includes(o)?'checked':''} onchange="updateEchoSelection('${id}')"> ${o}</label>`).join('')}</div>`}function renderCertaintySelect(id,sel){return `<select class="miniSelect" onchange="updateEchoCertainty('${id}',this.value)">${certaintyOptions.map(o=>`<option value="${o}" ${o===(sel||'Non renseigné')?'selected':''}>${o}</option>`).join('')}</select>`}function renderTable(rows){let html='';rows.forEach(item=>{const d=item.data,p=encodeURIComponent(JSON.stringify(pdfDataFromDoc(d)));html+=`<tr><td>${fmtDate(d.date)}</td><td>${d.nom||''}</td><td>${d.prenom||''}</td><td>${d.dob||''}</td><td>${d.pain?d.pain+'/10':''}</td><td>${Array.isArray(d.topo)?d.topo.join(', '):''}</td><td>${Array.isArray(d.time)?d.time.join(', '):''}</td><td>${Array.isArray(d.digestif)?d.digestif.join(', '):''}</td><td>${contraceptionText(d)}</td><td>${d.phenotype||''}</td><td>${d.endometriose||''}</td><td>${d.adenomyose||''}</td><td>${d.pudendal||''}</td><td>${d.congestion||''}</td><td>${renderEchoCheckboxes(item.id,d.diagnostic_echo)}</td><td>${renderCertaintySelect(item.id,d.echoCertainty)}</td><td><button class="miniBtn" onclick='generateDoctorPDF("${p}")'>PDF</button></td><td><button class="dangerBtn" onclick='deletePatient("${item.id}","${(d.prenom||'')+' '+(d.nom||'')}")'>Supprimer</button></td></tr>`});document.getElementById('tableBody').innerHTML=html||'<tr><td colspan="18">Aucun résultat.</td></tr>'}function applyFiltersAndSort(){const query=(document.getElementById('searchInput').value||'').toLowerCase().trim(),sort=document.getElementById('sortSelect').value;let rows=[...allPatients];if(query)rows=rows.filter(item=>JSON.stringify(item.data).toLowerCase().includes(query));rows.sort((a,b)=>{const da=a.data,db=b.data;switch(sort){case 'date_asc':return toTimestampValue(da.date)-toTimestampValue(db.date);case 'pain_desc':return Number(db.pain||0)-Number(da.pain||0);case 'pain_asc':return Number(da.pain||0)-Number(db.pain||0);case 'nom_asc':return String(da.nom||'').localeCompare(String(db.nom||''),'fr');case 'nom_desc':return String(db.nom||'').localeCompare(String(da.nom||''),'fr');default:return toTimestampValue(db.date)-toTimestampValue(da.date)}});renderTable(rows)}function loadPatients(){db.collection('patients').where('practitionerId','==',currentPractitioner).onSnapshot(s=>{allPatients=[];s.forEach(doc=>allPatients.push({id:doc.id,data:doc.data()}));applyFiltersAndSort()})}document.addEventListener('keydown',e=>{if(document.getElementById('pinOverlay').style.display!=='none'&&e.key==='Enter')checkPractitionerPin()});
</script></body></html>

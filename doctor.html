<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pelvis Pain Map - Patients</title>

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C9e3ce46af2b548bbf68608de802c3234%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639089124466869733%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=vc8QzMHQ133tFtvpF5kN2hm7pKwLn3nHSbxSxcnppFU%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C9e3ce46af2b548bbf68608de802c3234%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639089124466900888%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=DO1vFCaOPQorlGXzjQUm%2FaB8O7%2BG4cfsr0wVBVU2S6I%3D&reserved=0"></script>
<script src="firebase-config.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:0;
}

.container{
  width:1100px;
  max-width:95%;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:10px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.patientHeader{
  display:flex;
  justify-content:space-between;
  gap:20px;
  cursor:pointer;
}

.patientName{
  font-weight:bold;
  font-size:18px;
}

.patientMeta{
  color:#666;
  margin-top:4px;
}

.patientRight{
  min-width:220px;
  text-align:left;
}

.patientDetails{
  margin-top:15px;
  display:none;
}

.patientBox{
  background:#fafafa;
  border-radius:8px;
  padding:15px;
  margin-top:10px;
}

h2,h3{
  margin-top:0;
}

.emptyState{
  background:white;
  border-radius:10px;
  padding:30px;
  text-align:center;
  color:#666;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#f1f5f9;
  margin:4px 6px 0 0;
  font-size:13px;
}

.echoGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 30px;
}

.muted{
  color:#777;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.actionBtn{
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
}

.actionBtn.secondary{
  background:#e5e7eb;
  color:#111827;
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h2>Patients</h2>
    <div>
      <button class="actionBtn secondary" onclick="window.location.href='doctor-stats.html'">Stats</button>
    </div>
  </div>

  <div id="patients"></div>

</div>

<script>
const db = firebase.firestore();
const practitionerId = sessionStorage.getItem("ppm_currentPractitioner") || "alexandre_soum";

function safeValue(v){
  return (v === undefined || v === null || v === "") ? "-" : v;
}

function formatList(arr){
  return Array.isArray(arr) && arr.length ? arr.join(", ") : "-";
}

function buildSymptomsSummary(row){
  const items = [];

  if (row.endo1) items.push("Règles très douloureuses");
  if (row.aden1) items.push("Règles très abondantes");
  if (row.aden2) items.push("Caillots pendant les règles");
  if (row.endo2) items.push("Douleur pendant les rapports profonds");
  if (row.endo3) items.push("Douleur à la selle pendant les règles");
  if (row.endo4) items.push("Douleur à l'ovulation");
  if (row.cong1) items.push("Sensation de lourdeur dans le bassin");
  if (row.cong2) items.push("Douleur après les rapports");
  if (row.pud1) items.push("Douleur aggravée en position assise");
  if (row.uri1) items.push("Brûlures / pollakiurie / dysurie");

  return items.length ? items.join(", ") : "-";
}

function buildDigestiveSummary(row){
  const items = [];

  if (Array.isArray(row.digestif)) items.push(...row.digestif);

  if ((row.bloatingEvening || row.ballonnementsSoir === "Oui") && !items.includes("Ballonnements surtout le soir")) {
    items.push("Ballonnements surtout le soir");
  }

  return items.length ? items.join(", ") : "-";
}

function computeAge(dob){
  if (!dob) return "-";
  const d = new Date(dob);
  if (isNaN(d)) return "-";

  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  const m = today.getMonth() - d.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}

function formatDateValue(v){
  if (!v) return "-";

  if (typeof v === "string") return v;

  if (v && typeof v.toDate === "function") {
    const d = v.toDate();
    return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  }

  if (v.seconds) {
    const d = new Date(v.seconds * 1000);
    return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  }

  return "-";
}

function toggleDetails(id){
  const el = document.getElementById(id);
  el.style.display = (el.style.display === "none" || !el.style.display) ? "block" : "none";
}

function echoChecked(row, label){
  const arr = Array.isArray(row.diagnostic_echo) ? row.diagnostic_echo : [];
  return arr.includes(label) ? "checked" : "";
}

function renderPatient(id, row){
  const symptoms = buildSymptomsSummary(row);
  const digestif = buildDigestiveSummary(row);
  const age = row.age || computeAge(row.dob);
  const displayDate = formatDateValue(row.date);

  return `
    <div class="card">

      <div class="patientHeader" onclick="toggleDetails('p${id}')">
        <div>
          <div class="patientName">${safeValue(row.nom)} ${safeValue(row.prenom)}</div>
          <div class="patientMeta">${displayDate}</div>
        </div>

        <div class="patientRight">
          <div><b>Âge</b> ${safeValue(age)}</div>
          <div><b>Douleur</b> ${safeValue(row.pain)}/10</div>
          <div><b>Hypothèse</b> ${safeValue(row.hypothesisPrimary)}</div>
          <div><b>Résultat écho</b> ${formatList(row.diagnostic_echo)}</div>
        </div>
      </div>

      <div class="patientDetails" id="p${id}" style="display:none;">

        <div class="patientBox">
          <h3>Questionnaire</h3>
          <p><b>Topo :</b> ${formatList(row.topo)}</p>
          <p><b>Quand :</b> ${formatList(row.time)}</p>
          <p><b>Symptômes associés :</b> ${symptoms}</p>
          <p><b>Digestif :</b> ${digestif}</p>
          <p><b>Cycles hors contraception :</b> ${safeValue(row.cycleRegularity)}</p>
          <p><b>Contraception :</b> ${safeValue(row.contraceptionType)}</p>
          <p><b>Consultation antérieure :</b> ${safeValue(row.consultation)}</p>
          <p><b>Diagnostic évoqué :</b> ${safeValue(row.previousDiagnosis)}</p>
        </div>

        <div class="patientBox">
          <h3>Résultats écho</h3>

          <div class="echoGrid">
            <label><input type="checkbox" disabled ${echoChecked(row, "Endométriose")}> Endométriose</label>
            <label><input type="checkbox" disabled ${echoChecked(row, "Adénomyose")}> Adénomyose</label>

            <label><input type="checkbox" disabled ${echoChecked(row, "Congestion pelvienne")}> Congestion pelvienne</label>
            <label><input type="checkbox" disabled ${echoChecked(row, "Névralgie pudendale")}> Névralgie pudendale</label>

            <label><input type="checkbox" disabled ${echoChecked(row, "OPK")}> OPK</label>
            <label><input type="checkbox" disabled ${echoChecked(row, "Normal")}> Normal</label>

            <label><input type="checkbox" disabled ${echoChecked(row, "Non contributif")}> Non contributif</label>
            <label><input type="checkbox" disabled ${echoChecked(row, "Autre")}> Autre</label>
          </div>

          <p style="margin-top:12px;"><b>Certitude :</b> ${safeValue(row.echoCertainty)}</p>
        </div>

      </div>
    </div>
  `;
}

function loadPatients(){
  console.log("Chargement pour praticien =", practitionerId);

  db.collection("patients").onSnapshot(snapshot => {
    let html = "";
    let count = 0;

    snapshot.forEach(doc => {
      const row = doc.data();

      const match =
        row.practitionerId === practitionerId ||
        row.doc === practitionerId;

      if (match) {
        count++;
        html += renderPatient(doc.id, row);
      }
    });

    console.log("Nombre de dossiers affichés =", count);

    if (!count) {
      html = `
        <div class="emptyState">
          <h3>Aucune patiente trouvée</h3>
          <p class="muted">Aucun dossier n’est actuellement associé à ce praticien.</p>
          <p class="muted"><b>Praticien actif :</b> ${practitionerId}</p>
        </div>
      `;
    }

    document.getElementById("patients").innerHTML = html;
  }, error => {
    console.error("Erreur Firestore :", error);
    document.getElementById("patients").innerHTML = `
      <div class="emptyState">
        <h3>Erreur de chargement</h3>
        <p class="muted">${error.message}</p>
      </div>
    `;
  });
}

loadPatients();
</script>

</body>
</html>

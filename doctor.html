<style>

<div class="container">

  <div class="topbar">
    <h1 class="pageTitle">Patients</h1>

<script>
const practitionerId = sessionStorage.getItem("ppm_currentPractitioner") || "alexandre_soum";

const ECHOS = [
  "Endométriose",
  "Adénomyose",
  "Congestion pelvienne",
  "Névralgie pudendale",
  "OPK",
  "Normal",
  "Non contributif",
  "Autre"
];

const CERTS = ["Non renseigné","Suspect","Compatible","Confirmé"];

let patientCache = {};

function safeValue(v){
  return (v === undefined || v === null || v === "") ? "-" : v;
}

function textOrDash(v){
  return (v === undefined || v === null || v === "") ? "-" : String(v);
}

function formatList(arr){
  return Array.isArray(arr) && arr.length ? arr.join(", ") : "-";
}

function buildSymptomsSummary(row){
  const items = [];

  if (row.endo1) items.push("Règles très douloureuses");
  if (row.aden1) items.push("Règles très abondantes");
  if (row.aden2) items.push("Caillots pendant les règles");
  if (row.endo2) items.push("Douleur pendant les rapports profonds");
  if (row.endo3) items.push("Douleur à la selle pendant les règles");
  if (row.endo4) items.push("Douleur à l'ovulation");
  if (row.cong1) items.push("Sensation de lourdeur dans le bassin");
  if (row.cong2) items.push("Douleur après les rapports");
  if (row.pud1) items.push("Douleur aggravée en position assise");
  if (row.uri1) items.push("Brûlures / pollakiurie / dysurie");

  return items.length ? items.join(", ") : "-";
}

function buildDigestiveSummary(row){
  const items = Array.isArray(row.digestif) ? [...row.digestif] : [];

  if ((row.bloatingEvening || row.ballonnementsSoir === "Oui") && !items.includes("Ballonnements surtout le soir")) {
    items.push("Ballonnements surtout le soir");
  }

  return items.length ? items.join(", ") : "-";
}

function computeAge(dob){
  if (!dob) return "-";
  const d = new Date(dob);
  if (isNaN(d)) return "-";

  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  const m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}

function formatDateValue(v){
  if (!v) return "-";

  if (typeof v === "string") return v;

  if (v && typeof v.toDate === "function") {
    const d = v.toDate();
    return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {
      hour:"2-digit", minute:"2-digit", second:"2-digit"
    });
  }

  if (v.seconds) {
    const d = new Date(v.seconds * 1000);
    return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {
      hour:"2-digit", minute:"2-digit", second:"2-digit"
    });
  }

  return "-";
}

function toggleDetails(id){
  const el = document.getElementById("p" + id);
  const chev = document.getElementById("c" + id);

  const open = el.style.display === "block";
  el.style.display = open ? "none" : "block";
  if (chev) chev.textContent = open ? "▸" : "▾";
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function checkedEchoValues(row){
  return Array.isArray(row.diagnostic_echo) ? row.diagnostic_echo : [];
}

function echoChecked(row, label){
  return checkedEchoValues(row).includes(label) ? "checked" : "";
}

function renderEchoBadges(row){
  const arr = checkedEchoValues(row);
  if (!arr.length) return '<span class="badge">-</span>';
  return arr.map(v => `<span class="badge">${escapeHtml(v)}</span>`).join("");
}

function certOptions(selected){
  return CERTS.map(v => `<option value="${escapeHtml(v)}" ${v===selected?'selected':''}>${escapeHtml(v)}</option>`).join("");
}

function renderEchoCheckboxes(id, row){
  return ECHOS.map(label => `
    <label>
      <input type="checkbox" data-patient-id="${id}" data-echo-label="${escapeHtml(label)}" ${echoChecked(row, label)}>
      ${escapeHtml(label)}
    </label>
  `).join("");
}

function buildProfileEntry(label, level, pct){
  if (!level) return null;
  return { label, level, pct: (pct ?? 0) };
}

function buildProfilesData(row){
  const profiles = [
    buildProfileEntry("Endométriose", row.endometriose, row.endometriose_pct),
    buildProfileEntry("Adénomyose", row.adenomyose, row.adenomyose_pct),
    buildProfileEntry("Congestion pelvienne", row.congestion, row.congestion_pct),
    buildProfileEntry("Névralgie pudendale", row.pudendal, row.pudendal_pct),
    buildProfileEntry("OPK", row.opk, row.opk_pct),
    buildProfileEntry("Hypersensibilisation centrale", row.hypersensibilisation, row.hypersensibilisation_pct)
  ].filter(Boolean);

  profiles.sort((a,b) => (b.pct || 0) - (a.pct || 0));
  return profiles;
}

function buildProfilesSummary(row){
  const profiles = buildProfilesData(row)
    .filter(p => p.level !== "faible")
    .map(p => `${p.label} (${p.level}${typeof p.pct === "number" ? `, ${p.pct}%` : ""})`);

  return profiles.length ? profiles.join(", ") : "-";
}

function renderProfilesBlock(row){
  const profiles = buildProfilesData(row);
  if (!profiles.length) return '<p>-</p>';

  return profiles.map(p => `
    <div class="profileLine">
      <div class="profileName">${escapeHtml(p.label)} — ${escapeHtml(p.level)}</div>
      <div class="profileMeta">${escapeHtml(String(p.pct))}% du score maximal</div>
    </div>
  `).join("");
}

function buildPatientPdfText(row){
  const symptoms = buildSymptomsSummary(row);
  const digestif = buildDigestiveSummary(row);
  const age = row.age || computeAge(row.dob);
  const dateText = formatDateValue(row.date);
  const echoList = Array.isArray(row.diagnostic_echo) && row.diagnostic_echo.length
    ? row.diagnostic_echo.join(", ")
    : "-";
  const profiles = buildProfilesData(row)
    .map(p => `${p.label} : ${p.level} (${p.pct}%)`);

  return {
    title: "Pelvis Pain Map - Synthèse patiente",
    identity: [
      `Nom : ${textOrDash(row.nom)}`,
      `Prénom : ${textOrDash(row.prenom)}`,
      `Date du dossier : ${textOrDash(dateText)}`
    ],
    summary: [
      `Âge : ${textOrDash(age)}`,
      `Douleur : ${textOrDash(row.pain)}/10`,
      `Hypothèse principale : ${textOrDash(row.hypothesisPrimary)}`,
      `Pourcentage hypothèse principale : ${textOrDash(row.hypothesisPrimaryPct)}%`,
      `Résultat écho : ${echoList}`,
      `Certitude : ${textOrDash(row.echoCertainty)}`
    ],
    questionnaire: [
      `Topo : ${formatList(row.topo)}`,
      `Quand : ${formatList(row.time)}`,
      `Symptômes associés : ${symptoms}`,
      `Profils compatibles : ${buildProfilesSummary(row)}`,
      `Digestif : ${digestif}`,
      `Cycles hors contraception : ${textOrDash(row.cycleRegularity)}`,
      `Contraception : ${textOrDash(row.contraceptionType)}`,
      `Consultation antérieure : ${textOrDash(row.consultation)}`,
      `Diagnostic évoqué : ${textOrDash(row.previousDiagnosis)}`
    ],
    profiles: profiles.length ? profiles : ["-"],
    comment: textOrDash(row.echoComment)
  };
}

function addWrappedText(doc, text, x, y, maxWidth, lineHeight){
  const lines = doc.splitTextToSize(text, maxWidth);
  doc.text(lines, x, y);
  return y + (lines.length * lineHeight);
}

async function downloadPatientPDF(id){
  const row = patientCache[id];
  if (!row) {
    alert("Impossible de retrouver les données de cette patiente.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  const pageWidth = 210;
  const margin = 18;
  const contentWidth = pageWidth - margin * 2;
  let y = 20;

  const data = buildPatientPdfText(row);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(18);
  doc.text(data.title, margin, y);
  y += 10;

  doc.setDrawColor(220, 226, 235);
  doc.line(margin, y, pageWidth - margin, y);
  y += 8;

  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Identité", margin, y);
  y += 6;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  data.identity.forEach(line => {
    y = addWrappedText(doc, line, margin, y, contentWidth, 5.5);
    y += 1;
  });

  y += 4;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Synthèse", margin, y);
  y += 6;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  data.summary.forEach(line => {
    y = addWrappedText(doc, line, margin, y, contentWidth, 5.5);
    y += 1;
  });

  y += 4;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Questionnaire", margin, y);
  y += 6;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  data.questionnaire.forEach(line => {
    y = addWrappedText(doc, line, margin, y, contentWidth, 5.5);
    y += 1;
  });

  y += 4;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Profils", margin, y);
  y += 6;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  data.profiles.forEach(line => {
    y = addWrappedText(doc, line, margin, y, contentWidth, 5.5);
    y += 1;
  });

  y += 4;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Commentaire écho", margin, y);
  y += 6;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  y = addWrappedText(doc, data.comment, margin, y, contentWidth, 5.5);

  const safeNom = textOrDash(row.nom).replace(/[^\w\-]+/g, "_");
  const safePrenom = textOrDash(row.prenom).replace(/[^\w\-]+/g, "_");
  doc.save(`PelvisPainMap_${safeNom}_${safePrenom}.pdf`);
}

function renderPatient(id, row){
  const symptoms = buildSymptomsSummary(row);
  const digestif = buildDigestiveSummary(row);
  const age = row.age || computeAge(row.dob);
  const displayDate = formatDateValue(row.date);
  const cert = row.echoCertainty || "Non renseigné";
  const comment = row.echoComment || "";

  return `
    <div class="card">
      <div class="patientHeader" onclick="toggleDetails('${id}')">
        <div class="patientLeft">
          <div class="chevron" id="c${id}">▸</div>
          <div>
            <div class="patientName">${escapeHtml(safeValue(row.nom))} ${escapeHtml(safeValue(row.prenom))}</div>
            <div class="patientDate">${escapeHtml(displayDate)}</div>
          </div>
        </div>

        <div class="patientRight">
          <div><b>Âge</b> ${escapeHtml(String(safeValue(age)))}</div>
          <div><b>Douleur</b> ${escapeHtml(String(safeValue(row.pain)))}/10</div>
          <div><b>Hypothèse</b> ${escapeHtml(safeValue(row.hypothesisPrimary))}</div>
          <div><b>Poids hypothèse</b> ${escapeHtml(String(safeValue(row.hypothesisPrimaryPct)))}%</div>
          <div><b>Résultat écho</b> ${escapeHtml(formatList(row.diagnostic_echo))}</div>
        </div>
      </div>

      <div class="patientDetails" id="p${id}">
        <div class="detailGrid">
          <div>
            <div class="patientBox">
              <h3>Questionnaire</h3>
              <p><b>Topo :</b> ${escapeHtml(formatList(row.topo))}</p>
              <p><b>Quand :</b> ${escapeHtml(formatList(row.time))}</p>
              <p><b>Symptômes associés :</b> ${escapeHtml(symptoms)}</p>
              <p><b>Profils compatibles :</b> ${escapeHtml(buildProfilesSummary(row))}</p>
              <p><b>Digestif :</b> ${escapeHtml(digestif)}</p>
              <p><b>Cycles hors contraception :</b> ${escapeHtml(safeValue(row.cycleRegularity))}</p>
              <p><b>Contraception :</b> ${escapeHtml(safeValue(row.contraceptionType))}</p>
              <p><b>Consultation antérieure :</b> ${escapeHtml(safeValue(row.consultation))}</p>
              <p><b>Diagnostic évoqué :</b> ${escapeHtml(safeValue(row.previousDiagnosis))}</p>
            </div>

            <div class="patientBox">
              <h3>Profils détaillés</h3>
              ${renderProfilesBlock(row)}
            </div>

            <div class="patientBox">
              <h3>Résultats écho</h3>

              <div class="echoGrid">
                ${renderEchoCheckboxes(id, row)}
              </div>

              <div class="fieldLabel">Déjà cochés</div>
              <div class="badges" id="badges-${id}">
                ${renderEchoBadges(row)}
              </div>

              <div style="margin-top:14px;">
                <div class="fieldLabel">Certitude</div>
                <select class="selectField" id="cert-${id}" onchange="saveCertainty('${id}')">
                  ${certOptions(cert)}
                </select>
              </div>
            </div>
          </div>

          <div class="sideBox">
            <div class="patientBox">
              <h3>Commentaire</h3>
              <textarea class="textAreaField" id="comment-${id}" placeholder="Commentaire écho...">${escapeHtml(comment)}</textarea>
              <div class="bottomActions">
                <button class="smallBtn pdf" onclick="saveComment('${id}')">Enregistrer commentaire</button>
              </div>
            </div>

            <div class="patientBox">
              <h3>Actions</h3>
              <div class="bottomActions" style="justify-content:flex-start;">
                <button class="smallBtn pdf" onclick="downloadPatientPDF('${id}')">PDF</button>
                <button class="smallBtn delete" onclick="deletePatient('${id}')">Supprimer</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function saveEchoSelection(id){
  const checkboxes = [...document.querySelectorAll(`input[data-patient-id="${id}"][data-echo-label]`)];
  const values = checkboxes.filter(cb => cb.checked).map(cb => cb.getAttribute("data-echo-label"));

  await db.collection("patients").doc(id).update({
    diagnostic_echo: values
  });
}

async function saveCertainty(id){
  const value = document.getElementById(`cert-${id}`).value;
  await db.collection("patients").doc(id).update({
    echoCertainty: value
  });
}

async function saveComment(id){
  const value = document.getElementById(`comment-${id}`).value.trim();
  await db.collection("patients").doc(id).update({
    echoComment: value
  });
  alert("Commentaire enregistré");
}

async function deletePatient(id){
  const ok = confirm("Supprimer définitivement cette patiente ?");
  if (!ok) return;

  await db.collection("patients").doc(id).delete();
}

function bindEchoEvents(){
  document.querySelectorAll('input[data-patient-id][data-echo-label]').forEach(cb => {
    cb.addEventListener("change", async (e) => {
      e.stopPropagation();
      const id = e.target.getAttribute("data-patient-id");
      await saveEchoSelection(id);
    });
  });

  document.querySelectorAll('.selectField, .textAreaField, .smallBtn').forEach(el => {
    el.addEventListener("click", e => e.stopPropagation());
  });
}

function loadPatients(){
  db.collection("patients").onSnapshot(snapshot => {
    let html = "";
    let count = 0;
    patientCache = {};

    snapshot.forEach(docSnap => {
      const row = docSnap.data();
      const match = row.practitionerId === practitionerId || row.doc === practitionerId;

      if (match) {
        count++;
        patientCache[docSnap.id] = row;
        html += renderPatient(docSnap.id, row);
      }
    });

    if (!count) {
      html = `
        <div class="emptyState">
          <h3>Aucune patiente trouvée</h3>
          <p>Aucun dossier n’est actuellement associé à ce praticien.</p>
          <p><b>Praticien actif :</b> ${escapeHtml(practitionerId)}</p>
        </div>
      `;
    }

    document.getElementById("patients").innerHTML = html;
    bindEchoEvents();
  }, error => {
    document.getElementById("patients").innerHTML = `
      <div class="emptyState">
        <h3>Erreur de chargement</h3>
        <p>${escapeHtml(error.message)}</p>
      </div>
    `;
    console.error(error);
  });
}

loadPatients();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pelvis Pain Map - Patients</title>

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C89eddb98681a456910d808de80244f34%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639089090687334239%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=6%2FZUgJ9x5jQ375wKTLY%2F6Ea9sfEN8YxaQR6iRuLbqDQ%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C89eddb98681a456910d808de80244f34%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639089090687379111%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=ocnLrRdobgzTH%2BzRb6yFNPHdl2I2Wyrb6IPf5XUdIyA%3D&reserved=0"></script>

<script src="firebase-config.js"></script>

<style>

body{
font-family: Arial;
background:#f5f7fb;
margin:0;
padding:0;
}

.container{
width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.patientHeader{
display:flex;
justify-content:space-between;
cursor:pointer;
}

.patientName{
font-weight:bold;
font-size:18px;
}

.patientDetails{
margin-top:15px;
display:none;
}

.patientBox{
background:#fafafa;
border-radius:8px;
padding:15px;
margin-top:10px;
}

h3{
margin-top:0;
}

</style>
</head>


<body>

<div class="container">

<h2>Patients</h2>

<div id="patients"></div>

</div>

<script>

const db = firebase.firestore()

const practitionerId = sessionStorage.getItem("ppm_currentPractitioner") || "alexandre_soum"

function safeValue(v){
return (v === undefined || v === null || v === "") ? "-" : v
}

function formatList(arr){
return Array.isArray(arr) && arr.length ? arr.join(", ") : "-"
}

function buildSymptomsSummary(row){

const items=[]

if(row.endo1) items.push("Règles très douloureuses")
if(row.aden1) items.push("Règles très abondantes")
if(row.aden2) items.push("Caillots pendant les règles")
if(row.endo2) items.push("Douleur pendant les rapports profonds")
if(row.endo3) items.push("Douleur à la selle pendant les règles")
if(row.endo4) items.push("Douleur à l'ovulation")
if(row.cong1) items.push("Sensation de lourdeur dans le bassin")
if(row.cong2) items.push("Douleur après les rapports")
if(row.pud1) items.push("Douleur aggravée en position assise")
if(row.uri1) items.push("Brûlures / pollakiurie")

return items.length ? items.join(", ") : "-"
}

function buildDigestiveSummary(row){

const items=[]

if(Array.isArray(row.digestif)) items.push(...row.digestif)

if(row.bloatingEvening || row.ballonnementsSoir==="Oui"){
items.push("Ballonnements surtout le soir")
}

return items.length ? items.join(", ") : "-"
}

function toggleDetails(id){

const el=document.getElementById(id)

if(el.style.display==="none") el.style.display="block"
else el.style.display="none"

}

function renderPatient(id,row){

const symptoms=buildSymptomsSummary(row)
const digestif=buildDigestiveSummary(row)

const html=`

<div class="card">

<div class="patientHeader" onclick="toggleDetails('p${id}')">

<div>

<div class="patientName">
${safeValue(row.nom)} ${safeValue(row.prenom)}
</div>

<div>
${safeValue(row.date)}
</div>

</div>

<div>

<div>Âge ${safeValue(row.age)}</div>
<div>Douleur ${safeValue(row.pain)}/10</div>
<div><b>Hypothèse</b> ${safeValue(row.hypothesisPrimary)}</div>

</div>

</div>

<div class="patientDetails" id="p${id}">

<div class="patientBox">

<h3>Questionnaire</h3>

<p><b>Topo :</b> ${formatList(row.topo)}</p>

<p><b>Quand :</b> ${formatList(row.time)}</p>

<p><b>Symptômes associés :</b> ${symptoms}</p>

<p><b>Digestif :</b> ${digestif}</p>

<p><b>Cycles hors contraception :</b> ${safeValue(row.cycleRegularity)}</p>

<p><b>Contraception :</b> ${safeValue(row.contraceptionType)}</p>

<p><b>Consultation antérieure :</b> ${safeValue(row.consultation)}</p>

<p><b>Diagnostic évoqué :</b> ${safeValue(row.previousDiagnosis)}</p>

</div>


<div class="patientBox">

<h3>Résultats écho</h3>

<label><input type="checkbox"> Endométriose</label><br>
<label><input type="checkbox"> Adénomyose</label><br>
<label><input type="checkbox"> Congestion pelvienne</label><br>
<label><input type="checkbox"> Névralgie pudendale</label><br>
<label><input type="checkbox"> OPK</label><br>
<label><input type="checkbox"> Normal</label><br>
<label><input type="checkbox"> Non contributif</label><br>
<label><input type="checkbox"> Autre</label>

</div>

</div>

</div>
`

return html
}

function loadPatients(){

db.collection("patients")
.where("practitionerId","==",practitionerId)
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

html+=renderPatient(doc.id,doc.data())

})

document.getElementById("patients").innerHTML=html

})

}

loadPatients()

</script>

</body>
</html>

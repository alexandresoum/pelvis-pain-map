<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard praticien – V2</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    .patientList{display:flex;flex-direction:column;gap:12px}
    .patientCard{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;border:1px solid #eceff6}
    .patientSummary{display:grid;grid-template-columns:44px 1.2fr .8fr .8fr 1.4fr 1.1fr;gap:14px;align-items:center;padding:16px 18px;cursor:pointer}
    .patientSummary:hover{background:#fafbff}
    .patientCard.open .patientSummary{background:#f7f8ff}
    .chevron{font-size:22px;font-weight:bold;color:#6c63ff;text-align:center;user-select:none}
    .summaryMain{font-weight:700;color:#24324a}
    .summarySub{font-size:13px;color:#6b7280;margin-top:4px}
    .summaryCellTitle{font-size:12px;color:#6b7280;margin-bottom:4px}
    .summaryCellValue{font-weight:600;color:#1f2937}
    .patientDetails{display:none;padding:0 18px 18px 18px;border-top:1px solid #e5e7eb;background:#fcfcff}
    .patientCard.open .patientDetails{display:block}
    .detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
    .detailBox{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}
    .detailBox h3{margin:0 0 10px 0;font-size:16px;color:#24324a}
    .detailLine{line-height:1.6;margin:5px 0;color:#374151}
    .echo-group{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .echoItem{font-weight:normal;margin:0}
    .commentBox{width:100%;min-height:110px;padding:10px;border:1px solid #cfd7e6;border-radius:8px;font-size:14px;font-family:Arial, Helvetica, sans-serif;resize:vertical}
    .actionsRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;margin:4px 6px 0 0;background:#eef1ff;color:#24324a;border:1px solid #dde2ff}
    .pill.soft{background:#f8f9fb;border-color:#eceff3;color:#4b5563}
    .pill.good{background:#ecfdf3;border-color:#d1fadf;color:#027a48}
    .pill.warn{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .pill.info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .pill.dark{background:#f3f4f6;border-color:#d1d5db;color:#111827}
    .emptyState{background:#fff;padding:22px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .resultBadges{margin-top:6px}
    .boxSectionTitle{margin:12px 0 6px 0;font-size:13px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
    @media (max-width:1100px){
      .patientSummary{grid-template-columns:40px 1fr;gap:10px}
      .summaryResponsive{grid-column:2 / -1;display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .detailGrid{grid-template-columns:1fr}
      .echo-group{grid-template-columns:1fr}
    }
    @media (max-width:700px){
      .summaryResponsive{grid-template-columns:1fr}
      .actionsRow{flex-direction:column}
    }
  </style>
</head>
<body>
<div id="pinOverlay" class="pinOverlay">
  <div class="pinCard">
    <h2>Accès Dashboard praticien</h2>
  <label>ID praticien</label>
<input type="text" id="practitionerLogin" class="pinInput" placeholder>
    <label for="pinInput">Code PIN</label>
    <input type="password" id="pinInput" maxlength="4" class="pinInput">
    <button class="primary" onclick="checkPin()">Entrer</button>
    <p id="pinError" class="pinError"></p>
  </div>
</div>

<div id="content" style="display:none;">
  <header class="header">
    <h1>Patientes</h1>
    <p class="info" id="subtitle"></p>
  </header>
  

  <div class="container wide">
      <div class="card" id="doctorAccessCard">
  <h2>Liens utiles</h2>
  <p class="muted">Retrouvez ici votre lien questionnaire et votre QR code personnel.</p>

  <div style="margin-top:14px;">
    <label style="display:block;font-weight:600;margin-bottom:8px;">Lien questionnaire patientes</label>
    <a
      id="doctorQrUrl"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
      style="display:block;word-break:break-all;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;color:#24324a;text-decoration:none;font-weight:600;"
    ></a>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
    <button type="button" class="primary" onclick="copyDoctorQrUrl()">Copier le lien</button>
    <button type="button" class="ghostButton" onclick="downloadDoctorQr()">Télécharger le QR code</button>
  </div>

  <div style="margin-top:18px;">
    <label style="display:block;font-weight:600;margin-bottom:8px;">QR code patientes</label>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;display:inline-block;">
      <img
        id="doctorQrImage"
        alt="QR code questionnaire patientes"
        style="width:220px;max-width:100%;height:auto;display:block;"
      >
    </div>
  </div>

  <div style="margin-top:14px;">
    <div class="muted" id="doctorAccessStatus"></div>
  </div>
</div>
    <div class="toolbar toolbarTop">
      <input type="text" id="searchInput" class="searchInput" placeholder="Rechercher..." oninput="applyFiltersAndSort()">
      <select id="sortSelect" class="sortSelect" onchange="applyFiltersAndSort()">
        <option value="date_desc">Trier par date ↓</option>
        <option value="date_asc">Trier par date ↑</option>
        <option value="pain_desc">Trier par intensité ↓</option>
        <option value="pain_asc">Trier par intensité ↑</option>
        <option value="nom_asc">Trier par nom A → Z</option>
        <option value="nom_desc">Trier par nom Z → A</option>
      </select>
      <button class="statsBtn" onclick="openStats()">Stats</button>
    </div>

    

    <div id="patientList" class="patientList"></div>
  </div>
</div>



<script>


const LABELS = {
  alexandre_soum: "Alexandre Soum",
  praticien_2: "Dr Jean-Marc Levaillant",
  praticien_3: "Anne-Laure Siraga"
};

const ECHOS = [
  "Endométriose",
  "Adénomyose",
  "Congestion pelvienne",
  "Névralgie pudendale",
  "OPK",
  "Fibrome",
  "Normal",
  "Non contributif",
  "Autre"
];


  const HYPOTHESIS_THRESHOLDS = {
  nonConcluant: 30,
  possible: 45,
  probable: 60
};

   const ECHO_SCORE_LEVELS = ["", "possible", "probable", "fort"];

const ECHO_STRUCTURED_DIAGNOSES = [
  "Endométriose",
  "Adénomyose",
  "Congestion pelvienne",
  "Névralgie pudendale",
  "OPK",
  "Fibrome"
];

let currentPractitioner = null;
let rows = [];
let openCardId = null;
let currentDisplayedList = [];
  let currentDoctorQrUrl = "";
let currentDoctorQrImageUrl = "";

async function checkPin() {
  const p = document.getElementById("practitionerLogin").value.trim();
  const pin = document.getElementById("pinInput").value.trim();

  if (!p) {
    document.getElementById("pinError").textContent = "ID requis.";
    return;
  }

  try {
    const doc = await db.collection("pratitioners").doc(p).get();

    if (!doc.exists) {
      document.getElementById("pinError").textContent = "Praticien inconnu.";
      return;
    }

    const data = doc.data();

    if (!data.active) {
      document.getElementById("pinError").textContent = "Compte inactif.";
      return;
    }

    if (pin !== String(data.pin || "").trim()) {
      document.getElementById("pinError").textContent = "Code incorrect.";
      return;
    }

    currentPractitioner = p;
    sessionStorage.setItem("ppm_currentPractitioner", p);

    document.getElementById("pinOverlay").style.display = "none";
    document.getElementById("content").style.display = "block";
    document.getElementById("subtitle").textContent = data.name || p;

    renderDoctorAccessBox(p);

    loadRows();

  } catch (err) {
    console.error(err);
    document.getElementById("pinError").textContent = "Erreur connexion.";
  }
}

function openStats() {
  sessionStorage.setItem("ppm_currentPractitioner", currentPractitioner);
  window.location.href = "doctor-stats.html";
}

function fmtDate(d) {
  if (!d) return "";
  try {
    if (d.seconds) return new Date(d.seconds * 1000).toLocaleString();
    return new Date(d).toLocaleString();
  } catch(e) { return ""; }
}

function ts(d) {
  if (!d) return 0;
  try {
    if (d.seconds) return d.seconds;
    return new Date(d).getTime()/1000;
  } catch(e) { return 0; }
}

function ageFromDob(dob){
  if(!dob) return "";
  const b = new Date(dob);
  if(isNaN(b)) return "";
  const t = new Date();
  let a = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) a--;
  return a;
}

function safeList(arr){
  return (arr && arr.length) ? arr.join(", ") : "-";
}

function normalizeLevel(v) {
  if (!v) return "";
  if (v === "possible") return "modéré";
  return v;
}

  function getHypothesisInterpretation(d){
  const label = d.hypothesisPrimary || d.lesionPrimary || "-";
  const pct = Number(d.hypothesisPrimaryPct || 0);

  if (!label || pct <= 0){
    return {
      label: "Profil non concluant",
      pct: 0,
      level: "non_concluant",
      displayPct: "-"
    };
  }

  if (pct < HYPOTHESIS_THRESHOLDS.nonConcluant){
    return {
      label: "Profil non concluant",
      pct,
      level: "non_concluant",
      displayPct: `${pct}%`
    };
  }

  if (pct < HYPOTHESIS_THRESHOLDS.possible){
    return {
      label,
      pct,
      level: "possible",
      displayPct: `${pct}%`
    };
  }

  if (pct < HYPOTHESIS_THRESHOLDS.probable){
    return {
      label,
      pct,
      level: "probable",
      displayPct: `${pct}%`
    };
  }

  return {
    label,
    pct,
    level: "fort",
    displayPct: `${pct}%`
  };
}

  function getConfidenceInterpretation(d){

  const profiles = [
    Number(d.endometriose_pct || 0),
    Number(d.adenomyose_pct || 0),
    Number(d.pudendal_pct || 0),
    Number(d.congestion_pct || 0),
    Number(d.opk_pct || 0),
  ].sort((a,b)=>b-a);

  const top1 = profiles[0] || 0;
  const top2 = profiles[1] || 0;

  const gap = top1 - top2;

  const scoreTop = Math.min(40, top1 * 0.6);
  const scoreGap = Math.min(40, gap * 1.2);

  const total = Math.round(scoreTop + scoreGap);

  let level = "faible";
  if(total >= 70) level = "élevée";
  else if(total >= 40) level = "intermédiaire";

  return {score: total, level};
}


  function concordanceLabel(score){
  if(score >= 80) return "excellente";
  if(score >= 60) return "bonne";
  if(score >= 40) return "modérée";
  return "faible";
}

  function getPctForPathology(data, questionKey){
  const pctMap = {
    endometriose: Number(data.endometriose_pct || 0),
    adenomyose: Number(data.adenomyose_pct || 0),
    congestion: Number(data.congestion_pct || 0),
    pudendal: Number(data.pudendal_pct || 0),
    opk: Number(data.opk_pct || 0),
    fibrome: Number(data.fibrome_pct || 0)
  };

  return pctMap[questionKey] || 0;
}
  function getPathologyConcordanceStatus(data, questionKey, echoKey){
  const pct = getPctForPathology(data, questionKey);
  const echoList = Array.isArray(data.diagnostic_echo) ? data.diagnostic_echo : [];
  const echoLevel = data.echoScores?.[echoKey] || "";
  const echoPositive = echoList.includes(echoKey) || !!echoLevel;

  if (!echoPositive) {
    if (pct >= 60) return "forte suspicion non confirmée";
    if (pct >= 20) return "suspicion non confirmée";
    return "non concordant négatif";
  }

  if (pct === 0) return "discordance majeure";
  if (pct < 20) return "discordance";
  if (pct < 60) return "concordance modérée";
  return "concordance forte";
}

  function getPathologyConcordancePoints(data, questionKey, echoKey){
  const pct = getPctForPathology(data, questionKey);
  const echoList = Array.isArray(data.diagnostic_echo) ? data.diagnostic_echo : [];
  const echoLevel = data.echoScores?.[echoKey] || "";
  const echoPositive = echoList.includes(echoKey) || !!echoLevel;

  // Écho négative
  if (!echoPositive) {
    if (pct >= 60) return 0;   // forte suspicion non confirmée
    if (pct >= 20) return 1;   // suspicion partielle non confirmée
    if (pct > 0) return 1;     // faible suspicion non confirmée
    return 0;                  // non évoqué et non retrouvé
  }

  // Écho positive
  if (pct === 0) return 0;     // discordance majeure
  if (pct < 20) return 0;      // discordance
  if (pct < 60) return 2;      // concordance modérée
  return 3;                    // concordance forte
}
function levelToScore(level){
  const v = String(level || "").toLowerCase().trim();

  if (v === "fort" || v === "élevé" || v === "eleve") return 3;
  if (v === "probable" || v === "modéré" || v === "modere") return 2;
  if (v === "possible" || v === "faible") return 1;
  return 0;
}

function concordanceScore(questionLevel, echoLevel){
  const q = levelToScore(questionLevel);
  const e = levelToScore(echoLevel);
  return Math.max(0, 3 - Math.abs(q - e));
}

const MAIN_CONCORDANCE_DIAGNOSTICS = [
  { questionKey: "endometriose", echoKey: "Endométriose" },
  { questionKey: "adenomyose", echoKey: "Adénomyose" },
  { questionKey: "congestion", echoKey: "Congestion pelvienne" },
  { questionKey: "opk", echoKey: "OPK" },
];

const SECONDARY_PUDENDAL_DIAGNOSTIC = {
  questionKey: "pudendal",
  echoKey: "Névralgie pudendale"
};

function patientMainConcordance(data){
  const diagnostics = [
    { questionKey: "endometriose", echoKey: "Endométriose" },
    { questionKey: "adenomyose", echoKey: "Adénomyose" },
    { questionKey: "congestion", echoKey: "Congestion pelvienne" },
    { questionKey: "opk", echoKey: "OPK" }
  ];

  let total = 0;
  let max = 0;

  diagnostics.forEach(({ questionKey, echoKey }) => {
    total += getPathologyConcordancePoints(data, questionKey, echoKey);
    max += 3;
  });

  return max ? Math.round((total / max) * 100) : 0;
}
  function patientPudendalConcordance(data){
  const q = data[SECONDARY_PUDENDAL_DIAGNOSTIC.questionKey] || "";
  const qScore = levelToScore(q);

  let e = data.echoScores?.[SECONDARY_PUDENDAL_DIAGNOSTIC.echoKey] || "";
  const diagnosticEchoList = Array.isArray(data.diagnostic_echo) ? data.diagnostic_echo : [];

  if (!e && diagnosticEchoList.includes(SECONDARY_PUDENDAL_DIAGNOSTIC.echoKey)) {
    e = "probable";
  }

  const eScore = levelToScore(e);

  if (qScore === 0 && eScore === 0) {
    return null;
  }

  return Math.round((concordanceScore(q, e) / 3) * 100);
}

 function pudendalStatus(data){

  const pudPct = Number(data.pudendal_pct || 0);
  const echoList = Array.isArray(data.diagnostic_echo) ? data.diagnostic_echo : [];
  const echoPresent = echoList.includes("Névralgie pudendale");

  // Hypothèse forte (>80%) mais écho négatif
  if(pudPct >= 80 && !echoPresent){
    return "discordant";
  }

  // Hypothèse forte confirmée
  if(pudPct >= 80 && echoPresent){
    return "compatible";
  }

  // Hypothèse faible mais découverte écho
  if(pudPct < 40 && echoPresent){
    return "découverte échographique";
  }

  // Hypothèse intermédiaire
  if(pudPct >= 40){
    return "profil possible";
  }

  return "non évoqué";
}

  function isMainHypothesisMajorDiscordance(data){
  const hypothesisMap = {
    "Endométriose": "endometriose",
    "Adénomyose": "adenomyose",
    "Congestion pelvienne": "congestion",
    "OPK": "opk"
  };

  const hypo = getHypothesisInterpretation(data).label;
  const questionKey = hypothesisMap[hypo];

  if (!questionKey) return false;

  const echoKey = hypo;
  const status = getPathologyConcordanceStatus(data, questionKey, echoKey);

  return status === "discordance majeure";
}

  
function badgeClass(label) {
  if (!label) return "soft";
  const x = String(label).toLowerCase();
  if (x.includes("endom") || x.includes("adén") || x.includes("aden")) return "warn";
  if (x.includes("normal")) return "good";
  if (x.includes("non contributif")) return "soft";
  if (x.includes("opk")) return "info";
  if (x.includes("congestion") || x.includes("pudendal")) return "dark";
  if (x.includes("confirm")) return "good";
  if (x.includes("compatible")) return "info";
  if (x.includes("suspect")) return "warn";
  if (x.includes("élevé")) return "warn";
  if (x.includes("modéré")) return "info";
  if (x.includes("faible")) return "soft";
  return "soft";
}

function pillsFromList(arr){
  if (!arr || !arr.length) return '<span class="pill soft">-</span>';
  return arr.map(x => `<span class="pill ${badgeClass(x)}">${x}</span>`).join("");
}

function getMainHypothesis(d){
  return getHypothesisInterpretation(d).label;
}

function getMainHypothesisPct(d){
  const h = getHypothesisInterpretation(d);

  if (h.level === "non_concluant") return h.displayPct === "-" ? "-" : `${h.displayPct} · non concluant`;
  if (h.level === "possible") return `${h.displayPct} · possible`;
  if (h.level === "probable") return `${h.displayPct} · probable`;
  return `${h.displayPct} · fort`;
}

function buildSymptomsSummary(d){
  const items = [];
  if (d.endo1) items.push("Règles très douloureuses");
  if (d.aden1) items.push("Règles très abondantes");
  if (d.aden2) items.push("Caillots pendant les règles");
  if (d.endo2) items.push("Douleur pendant les rapports profonds");
  if (d.endo3) items.push("Douleur à la selle pendant les règles");
  if (d.endo4) items.push("Douleur à l'ovulation");
  if (d.cong1) items.push("Sensation de lourdeur dans le bassin");
  if (d.cong2) items.push("Douleur après les rapports");
  if (d.pud1) items.push("Douleur aggravée en position assise");
  if (d.uri1) items.push("Brûlures / pollakiurie / dysurie");
  return items.length ? items.join(", ") : "-";
}

function buildDigestiveSummary(d){
  const items = Array.isArray(d.digestif) ? [...d.digestif] : [];
  if ((d.bloatingEvening || d.ballonnementsSoir === "Oui") && !items.includes("Ballonnements surtout le soir")) {
    items.push("Ballonnements surtout le soir");
  }
  return items.length ? items.join(", ") : "-";
}

function profileEntries(d){
  return [
    { label: "Endométriose", level: normalizeLevel(d.endometriose), pct: d.endometriose_pct },
    { label: "Adénomyose", level: normalizeLevel(d.adenomyose), pct: d.adenomyose_pct },
    { label: "Névralgie pudendale", level: normalizeLevel(d.pudendal), pct: d.pudendal_pct },
    { label: "Congestion pelvienne", level: normalizeLevel(d.congestion), pct: d.congestion_pct },
    { label: "OPK", level: normalizeLevel(d.opk), pct: d.opk_pct },
    { label: "Hypersensibilisation centrale", level: normalizeLevel(d.hypersensibilisation), pct: d.hypersensibilisation_pct }
  ].filter(x => x.level);
}

function profileLabel(entry){
  const hasPct = entry.pct !== undefined && entry.pct !== null && entry.pct !== "";
  return `${entry.label} (${entry.level}${hasPct ? " – " + entry.pct + "%" : ""})`;
}

function compatibleProfiles(d){
  return profileEntries(d)
    .filter(x => x.level === "modéré" || x.level === "élevé")
    .sort((a,b) => Number(b.pct || 0) - Number(a.pct || 0));
}

function allProfilesAsPills(d){
  const entries = profileEntries(d).sort((a,b) => Number(b.pct || 0) - Number(a.pct || 0));
  if (!entries.length) return '<span class="pill soft">-</span>';
  return entries.map(x => `<span class="pill ${badgeClass(x.level)}">${profileLabel(x)}</span>`).join("");
}

function compatibleProfilesPills(d){
  const entries = compatibleProfiles(d);
  if (!entries.length) return '<span class="pill soft">-</span>';
  return entries.map(x => `<span class="pill ${badgeClass(x.level)}">${profileLabel(x)}</span>`).join("");
}

function pdfData(d) {
  return {
    dateText: fmtDate(d.date),
    practitionerName: d.practitionerName || "",
    nom: d.nom || "",
    prenom: d.prenom || "",
    dob: d.dob || "",
    pain: d.pain || "",
    topo: d.topo || [],
    time: d.time || [],
    digestif: d.digestif || [],
    contraceptionType: d.contraceptionType || "",
    pillContinuous: d.pillContinuous || "",
    consultation: d.consultation || "",
    previousDiagnosis: d.previousDiagnosis || "",
    cycleRegularity: d.cycleRegularity || "",
    hypothesisPrimary: getMainHypothesis(d),
    hypothesisPrimaryPct: d.hypothesisPrimaryPct || "",
    lesionPrimary: d.lesionPrimary || "",
    painTypePrimary: d.painTypePrimary || "",
    echoPrimary: d.echoPrimary || "",
    endometriose: normalizeLevel(d.endometriose) || "",
    endometriose_pct: d.endometriose_pct || "",
    adenomyose: normalizeLevel(d.adenomyose) || "",
    adenomyose_pct: d.adenomyose_pct || "",
    pudendal: normalizeLevel(d.pudendal) || "",
    pudendal_pct: d.pudendal_pct || "",
    congestion: normalizeLevel(d.congestion) || "",
    congestion_pct: d.congestion_pct || "",
    opk: normalizeLevel(d.opk) || "",
    opk_pct: d.opk_pct || "",
    hypersensibilisation: normalizeLevel(d.hypersensibilisation) || "",
    hypersensibilisation_pct: d.hypersensibilisation_pct || "",
    diagnostic_echo: d.diagnostic_echo || [],
    echoCertainty: d.echoCertainty || "Non renseigné",
    doctorComment: d.doctorComment || "",
    symptoms: buildSymptomsSummary(d),
    digestifSummary: buildDigestiveSummary(d),
    mainConcordance: patientMainConcordance(d),
pudendalConcordance: patientPudendalConcordance(d),
  };
}

function buildPdf(doc, d) {
  let y = 18;
  const line = (t) => {
    const s = doc.splitTextToSize(t, 170);
    doc.text(s, 20, y);
    y += s.length * 7 + 3;
  };

  const compatible = compatibleProfiles(d).map(profileLabel);
  const allProfiles = profileEntries(d).map(profileLabel);

  doc.setFontSize(16);
  doc.text("Pelvis Pain Map - Résultat questionnaire", 20, y);
  y += 12;
  doc.setFontSize(11);

  [
    "Date : " + d.dateText,
    "Praticien : " + d.practitionerName,
    "Patiente : " + d.prenom + " " + d.nom,
    "Date de naissance : " + (d.dob || "Non renseignée"),
    "Âge : " + (ageFromDob(d.dob) || "Non renseigné"),
    "Intensité : " + d.pain + "/10",
    "Localisation : " + safeList(d.topo),
    "Quand : " + safeList(d.time),
    "Symptômes associés : " + (d.symptoms || "-"),
    "Digestif : " + (d.digestifSummary || "-"),
    "Contraception : " + (d.contraceptionType || "-") + (d.pillContinuous ? " (continu : " + d.pillContinuous + ")" : ""),
    "Cycles hors contraception : " + (d.cycleRegularity || "-"),
    "Consultation antérieure : " + (d.consultation || "-"),
    "Diagnostic évoqué : " + (d.previousDiagnosis || "-"),
    "Hypothèse principale : " + (d.hypothesisPrimary || "-"),
    "Poids hypothèse : " + (d.hypothesisPrimaryPct ? d.hypothesisPrimaryPct + "%" : "-"),
    "Type de douleur dominant : " + (d.painTypePrimary || "-"),
    "Orientation échographique principale : " + (d.echoPrimary || "-"),
    "Profils compatibles : " + (compatible.length ? compatible.join(", ") : "-"),
    "Profils détaillés : " + (allProfiles.length ? allProfiles.join(", ") : "-"),
    "Concordance clinico-écho : " + (d.mainConcordance !== undefined ? d.mainConcordance + "% (" + concordanceLabel(d.mainConcordance) + ")" : "-"),
"Score secondaire pudendal : " + (d.pudendalConcordance !== null && d.pudendalConcordance !== undefined ? d.pudendalConcordance + "% (" + concordanceLabel(d.pudendalConcordance) + ")" : "-"),
    "Résultats écho : " + safeList(d.diagnostic_echo),
    "Certitude : " + (d.echoCertainty || "Non renseigné"),
    "Commentaire praticien : " + (d.doctorComment || "")
  ].forEach(line);
}

function generateDoctorPDF(payload) {
  const d = JSON.parse(decodeURIComponent(payload));
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  buildPdf(doc, d);
  doc.save("pelvis_pain_map_" + (d.prenom || "") + "_" + (d.nom || "patiente") + ".pdf");
}

function selectedEcho(id) {
  return [...document.querySelectorAll('.echo-group[data-id="' + id + '"] input:checked')].map(e => e.value);
}

async function updateEcho(id) {
  await db.collection("patients").doc(id).update({ diagnostic_echo: selectedEcho(id) });
}

async function updateEchoScore(id, diag, level){

  const ref = db.collection("patients").doc(id);
  const doc = await ref.get();
  const data = doc.data() || {};

  const scores = data.echoScores || {};
  scores[diag] = level;

  const oldEcho = Array.isArray(data.diagnostic_echo) ? data.diagnostic_echo : [];
  const keepSpecial = oldEcho.filter(x => x === "Normal" || x === "Non contributif");

  const structured = Object.keys(scores).filter(k => scores[k]);
  const diagnostic_echo = [...structured, ...keepSpecial];

  await ref.update({
    echoScores: scores,
    diagnostic_echo: diagnostic_echo
  });

  learnFromEcho({...data, echoScores: scores});
}

  async function learnFromEcho(data){

  if(!data.echoScores) return;

  const strong = Object.entries(data.echoScores)
    .filter(([k,v]) => v === "fort")
    .map(([k]) => k);

  if(!strong.length) return;

  const learnData = {
    topo: data.topo || [],
    time: data.time || [],
    digestif: data.digestif || [],
    pain: data.pain || 0,
    diagnoses: strong
  };

  await db.collection("learning").add(learnData);

}
  async function toggleEchoSpecial(id, label, checked){

  const ref = db.collection("patients").doc(id);
  const doc = await ref.get();
  const data = doc.data() || {};

  const scores = data.echoScores || {};
  let diagnostic_echo = Array.isArray(data.diagnostic_echo) ? [...data.diagnostic_echo] : [];

  // On reconstruit d'abord les diagnostics issus des menus
  const structured = Object.keys(scores).filter(k => scores[k]);

  diagnostic_echo = [...structured];

  if (checked) {
    if (!diagnostic_echo.includes(label)) diagnostic_echo.push(label);
  }

  await ref.update({
    echoScores: scores,
    diagnostic_echo: diagnostic_echo
  });
}


async function updateComment(id, value) {
  await db.collection("patients").doc(id).update({ doctorComment: value });
}

async function delRow(id, name) {
  if (!confirm("Supprimer cette fiche : " + name + " ?")) return;
  await db.collection("patients").doc(id).delete();
}

      const value = scores[diag] || "";

      return `

        <div style="width:180px;">${diag}</div>
        <select
          class="miniSelect"
          onclick="event.stopPropagation()"
          onchange="updateEchoScore('${id}','${diag}', this.value)"
        >
          ${ECHO_SCORE_LEVELS.map(level =>
            `<option value="${level}" ${level === value ? "selected" : ""}>${level || "—"}</option>`
          ).join("")}
        </select>
      </div>
      `;
    }).join("")}

   <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">

<label class="echoItem">
<input
type="checkbox"
${isNormal ? "checked" : ""}
onclick="event.stopPropagation()"
onchange="toggleEchoSpecial('${id}','Normal', this.checked)"
>
Normal
</label>

<label class="echoItem">
<input
type="checkbox"
${isNonContributif ? "checked" : ""}
onclick="event.stopPropagation()"
onchange="toggleEchoSpecial('${id}','Non contributif', this.checked)"
>
Non contributif
</label>

<label class="echoItem">
<input
type="checkbox"
${currentEcho.includes("Autre") ? "checked" : ""}
onclick="event.stopPropagation()"
onchange="toggleEchoSpecial('${id}','Autre', this.checked)"
>
Autre
</label>

</div>
  </div>
  `;
}

function commentBox(id, value) {
  return `<textarea class="commentBox" placeholder="Commentaire praticien..." onclick="event.stopPropagation()" onchange="updateComment('${id}', this.value)">${value || ""}</textarea>`;
}

function getCurrentDisplayedList() {
  return currentDisplayedList;
}

function toggleCard(id){
  if (openCardId === id) {
    openCardId = null;
  } else {
    openCardId = id;
  }
  renderList(getCurrentDisplayedList());
}

    const d = r.data;
    const age = ageFromDob(d.dob);
    const p = encodeURIComponent(JSON.stringify(pdfData(d)));
    const isOpen = openCardId === r.id;
    const hypothesis = getMainHypothesis(d);
    const hypothesisPct = getMainHypothesisPct(d);
    const confidence = getConfidenceInterpretation(d);
    const mainScore = patientMainConcordance(d);
const pudendalScore = patientPudendalConcordance(d);

    const hypothesisMap = {

  "Adénomyose": { questionKey: "adenomyose", echoKey: "Adénomyose" },
  "Congestion pelvienne": { questionKey: "congestion", echoKey: "Congestion pelvienne" },
  "OPK": { questionKey: "opk", echoKey: "OPK" }
};

const mainStatus = hypothesisMap[hypothesis]
  ? getPathologyConcordanceStatus(
      d,
      hypothesisMap[hypothesis].questionKey,
      hypothesisMap[hypothesis].echoKey

          </div>

          <div class="summaryResponsive">

              <div class="summaryCellTitle">Âge</div>

            </div>

            <div>
              <div class="summaryCellTitle">Douleur</div>

            </div>

            <div>
              <div class="summaryCellTitle">Hypothèse</div>
              <div class="summaryCellValue">${hypothesis}</div>
            </div>

            <div>
              <div class="summaryCellTitle">Poids hypothèse</div>
              <div class="summaryCellValue">${hypothesisPct}</div>
            </div>

            <div>
              <div class="summaryCellTitle">Résultat écho</div>
              <div class="summaryCellValue resultBadges">${pillsFromList(d.diagnostic_echo)}</div>
            ${d.diagnostic_echo && d.diagnostic_echo.length > 0 ? `
  <div class="summaryCellTitle">Concordance</div>
  <div class="summaryCellValue">${mainScore}% (${concordanceLabel(mainScore)})</div>
  <div class="summaryCellTitle">Profil pudendal</div>
<div class="summaryCellValue">${pudendalStatus(d)}</div>
` : ""}
            </div>

        </div>

        <div class="patientDetails">
          <div class="detailGrid">
            <div class="detailBox">
              <h3>Questionnaire</h3>
              <div class="detailLine"><b>Topo :</b> ${safeList(d.topo)}</div>
              <div class="detailLine"><b>Quand :</b> ${safeList(d.time)}</div>
              <div class="detailLine"><b>Symptômes associés :</b> ${buildSymptomsSummary(d)}</div>
              <div class="detailLine"><b>Digestif :</b> ${buildDigestiveSummary(d)}</div>
              <div class="detailLine"><b>Cycles hors contraception :</b> ${d.cycleRegularity || "-"}</div>
              <div class="detailLine"><b>Contraception :</b> ${(d.contraceptionType || "-")}${d.pillContinuous ? " (continu : " + d.pillContinuous + ")" : ""}</div>
              <div class="detailLine"><b>Consultation antérieure :</b> ${d.consultation || "-"}</div>

function applyFiltersAndSort() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase().trim();
  const sort = document.getElementById("sortSelect").value;
  let list = [...rows];

  if (q) {
    list = list.filter(r => JSON.stringify(r.data).toLowerCase().includes(q));
  }

  list.sort((a,b) => {
    const da = a.data, db = b.data;
    switch (sort) {
      case "date_asc": return ts(da.date) - ts(db.date);
      case "pain_desc": return Number(db.pain || 0) - Number(da.pain || 0);
      case "pain_asc": return Number(da.pain || 0) - Number(db.pain || 0);
      case "nom_asc": return String(da.nom || "").localeCompare(String(db.nom || ""), "fr");
      case "nom_desc": return String(db.nom || "").localeCompare(String(da.nom || ""), "fr");
      default: return ts(db.date) - ts(da.date);
    }
  });

  currentDisplayedList = list;
  renderList(list);
}

function loadRows() {
  db.collection("patients").where("practitionerId", "==", currentPractitioner).onSnapshot(s => {
    rows = [];
    s.forEach(doc => rows.push({ id: doc.id, data: doc.data() }));
    applyFiltersAndSort();
  });
}

 function renderDoctorAccessBox(practitionerId){
  if (!practitionerId) return;

  const qrUrl = `${window.location.origin}/index.html?doc=${encodeURIComponent(practitionerId)}`;
  const qrImageUrl =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
    encodeURIComponent(qrUrl);

  const linkEl = document.getElementById("doctorQrUrl");
  const imgEl = document.getElementById("doctorQrImage");
  const statusEl = document.getElementById("doctorAccessStatus");

  if (linkEl){
    linkEl.href = qrUrl;
    linkEl.textContent = qrUrl;
  }

  if (imgEl){
    imgEl.src = qrImageUrl;
  }

  if (statusEl){
    statusEl.textContent = `Identifiant praticien : ${practitionerId}`;
  }

  currentDoctorQrUrl = qrUrl;
  currentDoctorQrImageUrl = qrImageUrl;
}

async function copyDoctorQrUrl(){
  try{
    if (!currentDoctorQrUrl) {
      alert("Lien indisponible.");
      return;
    }

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(currentDoctorQrUrl);
    } else {
      const ta = document.createElement("textarea");
      ta.value = currentDoctorQrUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    const statusEl = document.getElementById("doctorAccessStatus");
    if (statusEl) statusEl.textContent = "Lien copié avec succès.";
  }catch(e){
    console.error(e);
    alert("Impossible de copier le lien.");
  }
}

function downloadDoctorQr(){
  if (!currentDoctorQrImageUrl) {
    alert("QR code indisponible.");
    return;
  }

  const a = document.createElement("a");
  a.href = currentDoctorQrImageUrl;
  a.download = "qr-code-pelvis-pain-map.png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

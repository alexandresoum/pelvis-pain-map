<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Patterns - Pelvis Pain Map</title>

<link rel="stylesheet" href="style.css">

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7Cd03e3742cc8341c20ef908de85cce308%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095312175561128%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=zL0KHw7E45Ovgw4psrXZ2qELdnBSo8D%2BHG9BUvBvTso%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7Cd03e3742cc8341c20ef908de85cce308%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095312175605203%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=RIn7vYnJeG2LOMlZSvyCZhAnWzJiNG4tAIQE4f%2B0Jy8%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fchart.js&data=05%7C02%7C%7Cd03e3742cc8341c20ef908de85cce308%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095312175633231%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=p%2FXCGzaOAioB48oPF2fNVJgvQAQzfYODU0ZVua%2FOhO8%3D&reserved=0"></script>

<script src="firebase-config.js"></script>
<script src="pelvis-ai-v3.js"></script>

<style>

/* ===== UI ===== */
.pinOverlay{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:50}
.pinCard{background:#fff;padding:24px;border-radius:16px;width:400px}
.pinInput{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:10px}

.primary{background:#4f46e5;color:white;border:none;padding:10px 14px;border-radius:10px}
.secondaryAction{padding:10px;border-radius:10px;border:1px solid #ccc;background:#fff}

.card{background:white;padding:18px;border-radius:14px;border:1px solid #e5e7eb;margin-bottom:18px}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}

.statLabel{font-size:13px;color:#6b7280}
.statValue{font-size:26px;font-weight:700}

.chartBox{height:350px}

.publicationBox{border:1px solid #e5e7eb;padding:14px;border-radius:12px;background:#fcfcff}
.publicationText{white-space:pre-line}

/* ===== tables ===== */
.simpleTable table{width:100%;border-collapse:collapse}
.simpleTable th,.simpleTable td{padding:8px;border-bottom:1px solid #eee}

</style>
</head>

<body>

<!-- PIN -->
<div id="pinOverlay" class="pinOverlay">
  <div class="pinCard">
    <h2>Accès Admin</h2>
    <input type="password" id="pinInput" maxlength="4" class="pinInput">
    <button class="primary" onclick="checkPin()">Entrer</button>
    <p id="pinError"></p>
  </div>
</div>

<div id="content" style="display:none;">

<header>
  <h1>Patterns</h1>
</header>

<div class="container">

<!-- ===== FILTRES ===== -->
<div class="card">

<label>Diagnostic</label>
<select id="echoTarget" onchange="updateAll()">
<option>Endométriose</option>
<option>Adénomyose</option>
<option>Congestion pelvienne</option>
<option>Névralgie pudendale</option>
<option>OPK</option>
</select>

<br><br>

<label>Praticien</label>
<select id="practitionerSelect" onchange="updateAll()">
<option value="all">Tous les praticiens</option>
<option value="alexandre_soum">Alexandre Soum</option>
<option value="praticien_2">Levaillant</option>
<option value="praticien_3">Siraga</option>
</select>

<button class="secondaryAction" onclick="selectAllPractitioners()">Tous</button>

</div>

<!-- ===== IA ===== -->
<div id="aiEnhancedBlock" class="card"></div>

<!-- ===== STATS ===== -->
<div class="statsGrid">

<div class="card">
<div class="statLabel">Dossiers</div>
<div id="statCases" class="statValue">0</div>
</div>

<div class="card">
<div class="statLabel">Top item</div>
<div id="statTopItem" class="statValue">-</div>
</div>

</div>

<!-- ===== GRAPH ===== -->
<div class="card">
<canvas id="patternChart"></canvas>
</div>

<!-- ===== TABLE ===== -->
<div class="card">
<div id="patternTable" class="simpleTable"></div>
</div>

</div>
</div>

<script>

const ADMIN_PIN = "1612";
let rows = [];
let chart;

function checkPin(){
  if(document.getElementById("pinInput").value === ADMIN_PIN){
    document.getElementById("pinOverlay").style.display="none";
    document.getElementById("content").style.display="block";
    loadRows();
  } else {
    document.getElementById("pinError").innerText="Code incorrect";
  }
}

function selectAllPractitioners(){
  document.getElementById("practitionerSelect").value="all";
  updateAll();
}

function selectedPractitioners(){
  const val = document.getElementById("practitionerSelect").value;
  if(val==="all") return ["alexandre_soum","praticien_2","praticien_3"];
  return [val];
}

function loadRows(){
  db.collection("patients").onSnapshot(s=>{
    rows=[];
    s.forEach(doc=>rows.push(doc.data()));
    updateAll();
  });
}

function updateAll(){

  const diag = document.getElementById("echoTarget").value;
  const selected = selectedPractitioners();

  const docs = rows.filter(d =>
    selected.includes(d.practitionerId)
  );

  document.getElementById("statCases").innerText = docs.length;

  // ===== IA =====
  renderEnhancedAI(docs);

  // ===== simple stat =====
  const top = docs[0];
  document.getElementById("statTopItem").innerText = top?.topo?.[0] || "-";

  // ===== chart =====
  const labels = docs.slice(0,10).map(d=>d.topo?.[0]||"");
  const data = docs.slice(0,10).map(()=>Math.random()*100);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("patternChart"),{
    type:"bar",
    data:{labels,datasets:[{data}]}
  });

  // ===== table =====
  document.getElementById("patternTable").innerHTML = `
  <table>
  <tr><th>Topo</th><th>Douleur</th></tr>
  ${docs.map(d=>`
    <tr>
      <td>${d.topo?.[0]||""}</td>
      <td>${d.pain||""}</td>
    </tr>
  `).join("")}
  </table>
  `;
}

function renderEnhancedAI(docs){

  if(!docs.length){
    document.getElementById("aiEnhancedBlock").innerHTML="Aucun data";
    return;
  }

  let total = docs.length;
  let top1OK=0;

  docs.forEach(d=>{
    const res = pelvisComputeV3(d);
    if(d.diagnostic_echo?.includes(res.top1?.label)) top1OK++;
  });

  const rate = Math.round((top1OK/total)*100);

  document.getElementById("aiEnhancedBlock").innerHTML = `
  <h2>IA</h2>

  <div class="statsGrid">
    <div class="card">
      <div class="statLabel">Top1 OK</div>
      <div class="statValue">${rate}%</div>
    </div>
  </div>

  <div class="publicationBox">
  L'IA est correcte dans ${rate}% des cas.
  </div>
  `;
}

</script>

</body>
</html>

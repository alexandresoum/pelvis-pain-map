<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Patterns - Pelvis Pain Map</title>

<link rel="stylesheet" href="style.css">

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C397038a8b19a4bcf7cb908de85c6a9dd%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095285451144201%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=GOEi6vXZSMO6qTfptqRlSLZ%2BfdB0nRw4nv8pPdVAL68%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C397038a8b19a4bcf7cb908de85c6a9dd%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095285451188663%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=h2eIM5d2D6pSNtA2y%2FUpAtaenXC6pp8xDeTNJ9GccAY%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fchart.js&data=05%7C02%7C%7C397038a8b19a4bcf7cb908de85c6a9dd%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095285451213400%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=gfQ3ve0smi8JKNH1rzahcYzQj6WS59p5diTAV3w2ycg%3D&reserved=0"></script>

<script src="firebase-config.js"></script>
<script src="pelvis-ai-v3.js"></script>

<style>
.pinOverlay{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:50;}
.pinCard{background:#fff;padding:20px;border-radius:12px;width:300px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:16px;}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.statValue{font-size:26px;font-weight:700;}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.secondaryAction{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:white;}
.primary{background:#4f46e5;color:white;border:none;padding:8px 12px;border-radius:8px;}
.statSub{font-size:12px;color:#6b7280;}
.publicationBox{margin-top:10px;padding:10px;border:1px solid #ddd;border-radius:10px;}
.publicationText{font-size:14px;line-height:1.6;}
</style>
</head>

<body>

<div id="pinOverlay" class="pinOverlay">
  <div class="pinCard">
    <h2>Accès Admin</h2>
    <input type="password" id="pinInput">
    <button onclick="checkPin()" class="primary">Entrer</button>
    <p id="pinError"></p>
  </div>
</div>

<div id="content" style="display:none;">

<div class="toolbar">
<button onclick="window.location.href='admin.html'" class="secondaryAction">← Retour</button>
</div>

<!-- FILTRES -->
<div class="card">
<h3>Filtres</h3>

<div class="toolbar">
<select id="echoTarget" onchange="updateAll()">
<option>Endométriose</option>
<option>Adénomyose</option>
<option>Congestion pelvienne</option>
<option>Névralgie pudendale</option>
<option>OPK</option>
<option>Normal</option>
<option>Non contributif</option>
<option>Autre</option>
</select>

<select id="practitionerSelect" onchange="updateAll()">
<option value="all">Tous les praticiens</option>
<option value="alexandre_soum">Alexandre Soum</option>
<option value="praticien_2">Levaillant</option>
<option value="praticien_3">Siraga</option>
</select>

<button onclick="selectAllPractitioners()" class="secondaryAction">Tous</button>
</div>
</div>

<!-- KPI -->
<div class="statsGrid">
<div class="card">
<div>Dossiers</div>
<div id="statCases" class="statValue">0</div>
</div>

<div class="card">
<div>Douleur moyenne</div>
<div id="statPain" class="statValue">0</div>
</div>
</div>

<!-- IA -->
<div class="card">
<div id="aiEnhancedBlock"></div>
</div>

<!-- CHART -->
<div class="card">
<h3>Top items</h3>
<canvas id="patternChart"></canvas>
</div>

</div>

<script>

const ADMIN_PIN = atob("MTYxMg==");
let rows = [];

function checkPin(){
if(document.getElementById("pinInput").value===ADMIN_PIN){
document.getElementById("pinOverlay").style.display="none";
document.getElementById("content").style.display="block";
loadRows();
}else{
document.getElementById("pinError").innerText="Code incorrect";
}
}

function selectedPractitioners(){
const val=document.getElementById("practitionerSelect").value;
if(val==="all") return ["alexandre_soum","praticien_2","praticien_3"];
return [val];
}

function selectAllPractitioners(){
document.getElementById("practitionerSelect").value="all";
updateAll();
}

function filteredDocs(){
return rows.map(r=>r.data).filter(d=>selectedPractitioners().includes(d.practitionerId));
}

function hasEchoDiagnosis(d,diag){
return (d.diagnostic_echo||[]).includes(diag);
}

function updateAll(){
const diag=document.getElementById("echoTarget").value;
const allDocs=filteredDocs();
const docs=allDocs.filter(d=>hasEchoDiagnosis(d,diag));

document.getElementById("statCases").innerText=docs.length;

const pain=docs.length?(docs.reduce((s,d)=>s+(Number(d.pain)||0),0)/docs.length).toFixed(1):0;
document.getElementById("statPain").innerText=pain;

renderEnhancedAI(docs);
drawChart(docs);
}

function loadRows(){
db.collection("patients").onSnapshot(s=>{
rows=[];
s.forEach(doc=>rows.push({id:doc.id,data:doc.data()}));
updateAll();
});
}

function drawChart(docs){
const value=docs.reduce((s,d)=>s+(Number(d.pain)||0),0);

new Chart(document.getElementById("patternChart"),{
type:"bar",
data:{labels:["Douleur"],datasets:[{data:[value]}]},
options:{responsive:true}
});
}

function renderEnhancedAI(rows){

if(!rows.length){
document.getElementById("aiEnhancedBlock").innerHTML="<p>Aucun dossier</p>";
return;
}

let total=rows.length;
let confidence=Math.round(rows.reduce((s,d)=>s+(Number(d.confidence)||0),0)/total);

document.getElementById("aiEnhancedBlock").innerHTML=`
<h2>🧠 Analyse IA</h2>

<div class="statsGrid">
<div class="card">
<div>Dossiers</div>
<div class="statValue">${total}</div>
</div>

<div class="card">
<div>Confiance</div>
<div class="statValue">${confidence}%</div>
</div>
</div>

<div class="publicationBox">
<div class="publicationText">
Analyse sur ${total} dossiers.

Confiance moyenne : ${confidence}%.

👉 Signal global cohérent.
</div>
</div>
`;
}

</script>

</body>
</html>

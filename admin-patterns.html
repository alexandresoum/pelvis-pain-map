<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Patterns - Pelvis Pain Map</title>

<link rel="stylesheet" href="style.css">

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C310abb4d3a71462599e208de85c94f81%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095296819553744%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=1m3QsofqZ5%2Fym2V2GzeY0yP6MrkoKc2%2FbeBxuoTg260%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C310abb4d3a71462599e208de85c94f81%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095296819592545%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=p5Xo8olx5JuqfIeTvUeUl1NeTbYu2e8I%2BLbutBoNaNU%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fchart.js&data=05%7C02%7C%7C310abb4d3a71462599e208de85c94f81%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095296819618430%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=Zp0q6PZk0iPHdYzObAj2MLiXI1L2UxKwndbJNsQckSg%3D&reserved=0"></script>

<script src="firebase-config.js"></script>
<script src="pelvis-ai-v3.js"></script>

<style>
.card{background:#fff;border-radius:12px;padding:16px;margin-top:16px;}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.statValue{font-size:24px;font-weight:700;}
.tag{display:inline-block;padding:4px 8px;border-radius:8px;background:#eef2ff;margin:3px;font-size:12px;}
.iaBox{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:10px;}
</style>

</head>

<body>

<h1>📊 Patterns par diagnostic écho</h1>

<!-- FILTRES -->
<div class="card">
<h3>Filtres</h3>

<select id="echoTarget" onchange="updateAll()">
<option>Endométriose</option>
<option>Adénomyose</option>
<option>Congestion pelvienne</option>
<option>Névralgie pudendale</option>
<option>OPK</option>
<option>Normal</option>
<option>Non contributif</option>
<option>Autre</option>
</select>

<select id="practitionerSelect" onchange="updateAll()">
<option value="all">Tous les praticiens</option>
<option value="alexandre_soum">Alexandre Soum</option>
<option value="praticien_2">Levaillant</option>
<option value="praticien_3">Siraga</option>
</select>

</div>

<!-- KPI -->
<div class="statsGrid">

<div class="card">
<div>Dossiers</div>
<div id="statCases" class="statValue">0</div>
</div>

<div class="card">
<div>Douleur moyenne</div>
<div id="statPain" class="statValue">0</div>
</div>

</div>

<!-- 🔥 IA AMÉLIORÉE MAIS MÊME EMPLACEMENT -->
<div class="card">
<h3>Résumé intelligent</h3>

<div id="summaryChips"></div>

<div class="iaBox" id="summaryText"></div>

</div>

<!-- TES BLOCS ORIGINAUX (inchangés) -->
<div class="card">
<h3>Top items les plus fréquents</h3>
<canvas id="patternChart"></canvas>
</div>

<div class="card">
<h3>Top ratios discriminants</h3>
<canvas id="ratioChart"></canvas>
</div>

<div class="card">
<h3>Poids suggérés</h3>
<canvas id="weightChart"></canvas>
</div>

<div class="card">
<h3>Timeline</h3>
<canvas id="timelineChart"></canvas>
</div>

<div class="card">
<h3>ROC</h3>
<canvas id="rocChart"></canvas>
</div>

<div class="card">
<h3>Heatmap</h3>
<div id="heatmap"></div>
</div>

<script>

let rows=[];

function selectedPractitioners(){
const val=document.getElementById("practitionerSelect").value;
if(val==="all") return ["alexandre_soum","praticien_2","praticien_3"];
return [val];
}

function filteredDocs(){
return rows.map(r=>r.data)
.filter(d=>selectedPractitioners().includes(d.practitionerId));
}

function hasEcho(d,diag){
return (d.diagnostic_echo||[]).includes(diag);
}

function updateAll(){

const diag=document.getElementById("echoTarget").value;

const docs=filteredDocs().filter(d=>hasEcho(d,diag));

document.getElementById("statCases").innerText=docs.length;

const pains=docs.map(d=>Number(d.pain)||0);
const avg=pains.length?(pains.reduce((a,b)=>a+b,0)/pains.length).toFixed(1):0;

document.getElementById("statPain").innerText=avg;

renderSmartSummary(docs);

// ⚠️ TES FONCTIONS EXISTANTES
renderTable?.(docs);
renderHeatmap?.(docs);
drawPatternChart?.(docs);
drawRatioChart?.(docs);
drawWeightChart?.(docs);
drawTimelineChart?.(docs);
updateRocSection?.(docs);

}

function renderSmartSummary(docs){

if(!docs.length){
document.getElementById("summaryText").innerHTML="Aucune donnée";
return;
}

let itemCount={};

docs.forEach(d=>{
(d.items||[]).forEach(i=>{
itemCount[i]=(itemCount[i]||0)+1;
});
});

let topItems=Object.entries(itemCount)
.sort((a,b)=>b[1]-a[1])
.slice(0,8);

// chips visuelles
document.getElementById("summaryChips").innerHTML =
topItems.map(i=>`<span class="tag">${i[0]} (${i[1]})</span>`).join("");

// texte IA amélioré
let strong=topItems.slice(0,3).map(i=>i[0]).join(", ");
let moderate=topItems.slice(3,6).map(i=>i[0]).join(", ");

document.getElementById("summaryText").innerHTML = `

<b>Items fortement évocateurs :</b><br>
${strong || "Aucun"}<br><br>

<b>Items utiles :</b><br>
${moderate || "Aucun"}<br><br>

<b>Interprétation :</b><br>
Pattern global cohérent avec <b>${document.getElementById("echoTarget").value}</b>.

Les items dominants orientent vers un mécanisme ${
strong.includes("défécation") ? "digestif profond" :
strong.includes("rapports") ? "lésion ligamentaire/postérieure" :
"mixte"
}.
`;

}

function load(){
db.collection("patients").onSnapshot(s=>{
rows=[];
s.forEach(doc=>rows.push({id:doc.id,data:doc.data()}));
updateAll();
});
}

load();

</script>

</body>
</html>

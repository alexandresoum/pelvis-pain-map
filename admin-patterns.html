<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Patterns - Pelvis Pain Map</title>

<link rel="stylesheet" href="style.css">

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C66e12f85f1484750559408de85c7084c%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095287033091202%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=t%2B%2FYB2F6LWIE07ljLORWlWrgEmzViA7W%2FRyJkFHyKXM%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C66e12f85f1484750559408de85c7084c%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095287033118235%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=uY6b%2B7NDd6sqI0rg%2BOu8rmM2Pl4tjfIup9sY2yZNa6M%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fchart.js&data=05%7C02%7C%7C66e12f85f1484750559408de85c7084c%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095287033134241%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=WpDtek%2B61ZyQSfI6VICcZ7%2BXyWIsRXu2uxqbnZ9PDbM%3D&reserved=0"></script>

<script src="firebase-config.js"></script>
<script src="pelvis-ai-v3.js"></script>

<style>
body{background:#f5f7fb;font-family:sans-serif;}
.card{background:#fff;border-radius:14px;padding:18px;margin-top:18px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
.statValue{font-size:28px;font-weight:700;}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;}
select,button{padding:10px;border-radius:10px;border:1px solid #ddd;}
.primary{background:#4f46e5;color:white;border:none;}
.secondary{background:white;}
.chartBox{height:350px;}
</style>
</head>

<body>

<div id="content">

<h1>📊 Patterns diagnostiques</h1>

<div class="toolbar">
<select id="echoTarget" onchange="updateAll()">
<option>Endométriose</option>
<option>Adénomyose</option>
<option>Congestion pelvienne</option>
<option>Névralgie pudendale</option>
<option>OPK</option>
<option>Normal</option>
<option>Non contributif</option>
<option>Autre</option>
</select>

<select id="practitionerSelect" onchange="updateAll()">
<option value="all">Tous les praticiens</option>
<option value="alexandre_soum">Alexandre Soum</option>
<option value="praticien_2">Levaillant</option>
<option value="praticien_3">Siraga</option>
</select>

<button onclick="selectAllPractitioners()">Tous</button>
</div>

<!-- KPI -->
<div class="statsGrid">

<div class="card">
<div>Dossiers</div>
<div id="statCases" class="statValue">0</div>
</div>

<div class="card">
<div>Douleur moyenne</div>
<div id="statPain" class="statValue">0</div>
</div>

<div class="card">
<div>Signal</div>
<div id="statSignal" class="statValue">-</div>
</div>

</div>

<!-- IA -->
<div class="card">
<div id="aiEnhancedBlock"></div>
</div>

<!-- CHART -->
<div class="card">
<h3>Distribution douleur</h3>
<div class="chartBox">
<canvas id="chart1"></canvas>
</div>
</div>

</div>

<script>

let rows=[];

function selectedPractitioners(){
const val=document.getElementById("practitionerSelect").value;
if(val==="all") return ["alexandre_soum","praticien_2","praticien_3"];
return [val];
}

function selectAllPractitioners(){
document.getElementById("practitionerSelect").value="all";
updateAll();
}

function filteredDocs(){
return rows.map(r=>r.data).filter(d=>selectedPractitioners().includes(d.practitionerId));
}

function hasEcho(d,diag){
return (d.diagnostic_echo||[]).includes(diag);
}

function safePain(v){
v=Number(v);
if(isNaN(v)||v>10||v<0) return null;
return v;
}

function updateAll(){

const diag=document.getElementById("echoTarget").value;
const allDocs=filteredDocs();
const docs=allDocs.filter(d=>hasEcho(d,diag));

document.getElementById("statCases").innerText=docs.length;

const pains=docs.map(d=>safePain(d.pain)).filter(v=>v!==null);
const painAvg=pains.length?(pains.reduce((a,b)=>a+b,0)/pains.length).toFixed(1):0;

document.getElementById("statPain").innerText=painAvg;

document.getElementById("statSignal").innerText=
docs.length>20?"Fort":
docs.length>10?"Modéré":
docs.length>3?"Faible":"Très faible";

drawChart(pains);
renderEnhancedAI(docs);

}

let chart;

function drawChart(data){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart1"),{
type:"bar",
data:{
labels:["0-2","3-5","6-8","9-10"],
datasets:[{
data:[
data.filter(x=>x<=2).length,
data.filter(x=>x>=3&&x<=5).length,
data.filter(x=>x>=6&&x<=8).length,
data.filter(x=>x>=9).length
]
}]
},
options:{responsive:true}
});

}

function renderEnhancedAI(docs){

if(!docs.length){
document.getElementById("aiEnhancedBlock").innerHTML="<p>Aucune donnée</p>";
return;
}

let total=docs.length;
let match=0;

docs.forEach(d=>{
let res=pelvisComputeV3(d);
if(res.top1 && (d.diagnostic_echo||[]).includes(res.top1.label)) match++;
});

let rate=Math.round((match/total)*100);

document.getElementById("aiEnhancedBlock").innerHTML=`
<h2>🧠 Analyse IA avancée</h2>

<div class="statsGrid">

<div class="card">
<div>Concordance IA</div>
<div class="statValue">${rate}%</div>
</div>

<div class="card">
<div>Dossiers</div>
<div class="statValue">${total}</div>
</div>

</div>

<div class="card">
Analyse basée sur ${total} dossiers.

👉 L’IA retrouve le diagnostic dans ${rate}% des cas.

${rate>70?"Signal très fort":
rate>50?"Signal correct":
"Signal faible — nécessite plus de données"}
</div>
`;
}

function load(){
db.collection("patients").onSnapshot(s=>{
rows=[];
s.forEach(doc=>rows.push({id:doc.id,data:doc.data()}));
updateAll();
});
}

load();

</script>

</body>
</html>

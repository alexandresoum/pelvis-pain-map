<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Patterns - Pelvis Pain Map</title>

<link rel="stylesheet" href="style.css">

<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-app-compat.js&data=05%7C02%7C%7C76e1b4cb739b4303b4e208de85c29dd3%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095268088454586%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=i6P6Fvy9%2BIb%2BQ4zTeZUz0IKmyvmAGoc2oCvGxpAvMvQ%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.gstatic.com%2Ffirebasejs%2F10.12.0%2Ffirebase-firestore-compat.js&data=05%7C02%7C%7C76e1b4cb739b4303b4e208de85c29dd3%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095268088479967%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=1BGJE%2BC%2BOaclHm2eawhJR5gzvS%2By%2FOp559WR6u3EzHE%3D&reserved=0"></script>
<script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fchart.js&data=05%7C02%7C%7C76e1b4cb739b4303b4e208de85c29dd3%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639095268088494775%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=dDxlNdicxyBmHTPnc85o58hlMxMOMJLqK8kJXSNVyEA%3D&reserved=0"></script>

<script src="firebase-config.js"></script>
<script src="pelvis-ai-v3.js"></script>

<style>
/* ==== STYLES EXISTANTS + AJOUTS ==== */
.pinOverlay{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(4px);}
.pinCard{width:min(92vw,420px);background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.18);}
.pinInput{width:100%;margin:8px 0 14px;padding:12px;border:1px solid #d1d5db;border-radius:10px;}
.pinError{color:#b91c1c;min-height:22px;}

.card,.filtersCard,.statCard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:18px 0;}
.statLabel{font-size:14px;color:#6b7280;}
.statValue{font-size:28px;font-weight:700;color:#24324a;}
.statValue.small{font-size:18px;}
.statSub{font-size:13px;color:#6b7280;margin-top:6px;}

.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
select,input{padding:10px;border-radius:10px;border:1px solid #d1d5db;}

.primary{background:#4f46e5;color:white;padding:10px 14px;border-radius:10px;border:none;}
.secondaryAction{background:white;border:1px solid #d1d5db;padding:10px 14px;border-radius:10px;}

.publicationBox{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#fcfcff;}
.publicationText{white-space:pre-line;font-size:14px;line-height:1.6;color:#374151;}

.chartBox{height:350px;}
</style>
</head>

<body>

<!-- PIN -->
<div id="pinOverlay" class="pinOverlay">
  <div class="pinCard">
    <h2>Accès Admin</h2>
    <input type="password" id="pinInput" maxlength="4" class="pinInput">
    <button class="primary" onclick="checkPin()">Entrer</button>
    <p id="pinError" class="pinError"></p>
  </div>
</div>

<!-- CONTENT -->
<div id="content" style="display:none;">

<div class="container wide">

<!-- NAV -->
<div class="toolbar">
<button onclick="window.location.href='admin.html'" class="secondaryAction">← Retour admin</button>
</div>

<!-- FILTRES -->
<div class="filtersCard">
<h2>Filtres</h2>

<div class="toolbar">

<select id="echoTarget" onchange="updateAll()">
<option>Endométriose</option>
<option>Adénomyose</option>
<option>Congestion pelvienne</option>
<option>Névralgie pudendale</option>
<option>OPK</option>
<option>Normal</option>
<option>Non contributif</option>
</select>

<select id="practitionerSelect" onchange="updateAll()">
<option value="all">Tous les praticiens</option>
<option value="alexandre_soum">Alexandre Soum</option>
<option value="praticien_2">Dr Levaillant</option>
<option value="praticien_3">Siraga</option>
</select>

<button onclick="selectAllPractitioners()" class="secondaryAction">Tous les praticiens</button>

</div>
</div>

<!-- KPIs -->
<div class="statsGrid">
<div class="statCard"><div class="statLabel">Dossiers</div><div id="statCases" class="statValue">0</div></div>
<div class="statCard"><div class="statLabel">Douleur</div><div id="statPain" class="statValue">0</div></div>
</div>

<!-- IA -->
<div class="card">
<div id="aiEnhancedBlock"></div>
</div>

<!-- GRAPHS -->
<div class="card">
<h2>Top items</h2>
<div class="chartBox"><canvas id="patternChart"></canvas></div>
</div>

</div>
</div>

<script>

const ADMIN_PIN = atob("MTYxMg==");
let rows = [];

function checkPin(){
if(document.getElementById("pinInput").value === ADMIN_PIN){
document.getElementById("pinOverlay").style.display="none";
document.getElementById("content").style.display="block";
loadRows();
}else{
document.getElementById("pinError").innerText="Code incorrect";
}
}

function selectedPractitioners(){
const val = document.getElementById("practitionerSelect").value;
if(val==="all") return ["alexandre_soum","praticien_2","praticien_3"];
return [val];
}

function selectAllPractitioners(){
document.getElementById("practitionerSelect").value="all";
updateAll();
}

function filteredDocs(){
return rows.map(r=>r.data).filter(d=>selectedPractitioners().includes(d.practitionerId));
}

function hasEchoDiagnosis(d, diag){
return (d.diagnostic_echo||[]).includes(diag);
}

function updateAll(){
const diag = document.getElementById("echoTarget").value;
const allDocs = filteredDocs();
const docs = allDocs.filter(d=>hasEchoDiagnosis(d,diag));

document.getElementById("statCases").innerText = docs.length;
document.getElementById("statPain").innerText = docs.length ?
(docs.reduce((s,d)=>s+(d.pain||0),0)/docs.length).toFixed(1) : 0;

renderEnhancedAI(docs);
drawChart(docs);
}

function loadRows(){
db.collection("patients").onSnapshot(s=>{
rows=[];
s.forEach(doc=>rows.push({id:doc.id,data:doc.data()}));
updateAll();
});
}

function drawChart(docs){
const labels=["Douleur"];
const data=[docs.reduce((s,d)=>s+(d.pain||0),0)];

new Chart(document.getElementById("patternChart"),{
type:"bar",
data:{labels,datasets:[{data}]},
options:{responsive:true}
});
}

function renderEnhancedAI(rows){

if(!rows.length){
document.getElementById("aiEnhancedBlock").innerHTML="<p>Aucune donnée</p>";
return;
}

let total=rows.length;
let confidence=Math.round(rows.reduce((s,d)=>s+(d.confidence||0),0)/total);

document.getElementById("aiEnhancedBlock").innerHTML=`
<h2>🧠 Analyse IA</h2>

<div class="statsGrid">
<div class="statCard">
<div class="statLabel">Dossiers</div>
<div class="statValue">${total}</div>
</div>

<div class="statCard">
<div class="statLabel">Confiance</div>
<div class="statValue">${confidence}%</div>
</div>
</div>

<div class="publicationBox">
<div class="publicationText">
Analyse basée sur ${total} dossiers.

Confiance globale : ${confidence}%.

👉 Interprétation : cohérence globale correcte.
</div>
</div>
`;
}

</script>

</body>
</html>

<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Statistiques praticien - Pelvis Pain Map</title><link rel='stylesheet' href='style.css'><script src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js'></script><script src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'></script><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><script src='firebase-config.js'></script></head><body><header class='header'><h1>Statistiques Pelvis Pain Map</h1><p class='info' id='statsSubtitle'>Vue stats praticien</p></header><div class='container wide'><div class='toolbar toolbarTop'><button class='secondaryAction' onclick="window.location.href='doctor.html'">← Retour patientes</button><select id='statsPractitioner' class='sortSelect' onchange='changePractitioner()'><option value='alexandre_soum'>Alexandre Soum</option><option value='praticien_2'>Praticien 2</option><option value='praticien_3'>Praticien 3</option></select></div><div class='statsGrid'><div class='statCard'><div class='statLabel'>Patientes</div><div class='statValue' id='statPatients'>0</div></div><div class='statCard'><div class='statLabel'>Douleur moyenne</div><div class='statValue' id='statPain'>0</div></div><div class='statCard'><div class='statLabel'>Endométriose compatible</div><div class='statValue' id='statEndo'>0</div></div><div class='statCard'><div class='statLabel'>Digestif présent</div><div class='statValue' id='statDigestif'>0</div></div></div><div class='chartGrid'><div class='card'><h2>Profils cliniques</h2><canvas id='profilesChart'></canvas></div><div class='card'><h2>Signes digestifs</h2><canvas id='digestiveChart'></canvas></div><div class='card'><h2>Résultats écho</h2><canvas id='echoChart'></canvas></div></div><div class='card'><h2>Statistiques libres</h2><div class='toolbar toolbar3'><select id='freeVar1' class='sortSelect'><option value='topo'>Localisation douleur</option><option value='time'>Quand douleur</option><option value='digestif'>Signes digestifs</option><option value='contraceptionType'>Type de contraception</option><option value='diagnostic_echo'>Diagnostic écho</option><option value='phenotype'>Phénotype douleur</option></select><select id='freeFilter' class='sortSelect'><option value=''>Sans filtre</option><option value='endo_compatible'>Filtre : endométriose compatible</option><option value='adeno_compatible'>Filtre : adénomyose compatible</option><option value='pudendal_compatible'>Filtre : pudendal compatible</option><option value='congestion_compatible'>Filtre : congestion compatible</option></select><button class='miniWideBtn' onclick='runFreeStats()'>Analyser</button></div><div class='card chartInner'><canvas id='freeStatsChart'></canvas></div><div id='freeStatsTable' class='simpleTable'></div></div></div><script>
const PRACTITIONER_LABELS={alexandre_soum:'Alexandre Soum',praticien_2:'Praticien 2',praticien_3:'Praticien 3'};let currentPractitioner=sessionStorage.getItem('ppm_currentPractitioner')||'alexandre_soum',allPatients=[],profilesChart=null,digestiveChart=null,echoChart=null,freeStatsChart=null;function isCompatible(level){return level==='possible'||level==='élevé'}function drawChart(id,type,labels,data){let chart=id==='profilesChart'?profilesChart:id==='digestiveChart'?digestiveChart:id==='echoChart'?echoChart:freeStatsChart;if(chart)chart.destroy();const c=new Chart(document.getElementById(id),{type:type,data:{labels:labels,datasets:[{data:data}]},options:{responsive:true,maintainAspectRatio:false}});if(id==='profilesChart')profilesChart=c;if(id==='digestiveChart')digestiveChart=c;if(id==='echoChart')echoChart=c;if(id==='freeStatsChart')freeStatsChart=c}function changePractitioner(){currentPractitioner=document.getElementById('statsPractitioner').value;sessionStorage.setItem('ppm_currentPractitioner',currentPractitioner);loadPatients()}function updateHeader(){document.getElementById('statsPractitioner').value=currentPractitioner;document.getElementById('statsSubtitle').innerText='Vue stats – '+PRACTITIONER_LABELS[currentPractitioner]}function updateStats(){const docs=allPatients.map(r=>r.data),total=docs.length,painAvg=total?(docs.reduce((s,d)=>s+Number(d.pain||0),0)/total).toFixed(1):'0',endoCompatible=docs.filter(d=>isCompatible(d.endometriose)).length,digestifPresent=docs.filter(d=>Array.isArray(d.digestif)&&d.digestif.some(x=>x!=='Aucun signe digestif')).length;document.getElementById('statPatients').innerText=total;document.getElementById('statPain').innerText=painAvg+'/10';document.getElementById('statEndo').innerText=endoCompatible;document.getElementById('statDigestif').innerText=digestifPresent;drawChart('profilesChart','bar',['Endométriose','Adénomyose','Pudendal','Congestion'],[docs.filter(d=>isCompatible(d.endometriose)).length,docs.filter(d=>isCompatible(d.adenomyose)).length,docs.filter(d=>isCompatible(d.pudendal)).length,docs.filter(d=>isCompatible(d.congestion)).length]);const dig={'Ballonnements':0,'Diarrhée':0,'Constipation':0,'Alternance diarrhée / constipation':0,'Douleur à la défécation':0};docs.forEach(d=>(d.digestif||[]).forEach(x=>{if(dig[x]!==undefined)dig[x]++}));drawChart('digestiveChart','bar',Object.keys(dig),Object.values(dig));const echo={'Endométriose':0,'Adénomyose':0,'Névralgie pudendale':0,'Congestion pelvienne':0,'Normal / non contributif':0,'Mixte':0};docs.forEach(d=>(Array.isArray(d.diagnostic_echo)?d.diagnostic_echo:[]).forEach(x=>{if(echo[x]!==undefined)echo[x]++}));drawChart('echoChart','pie',Object.keys(echo),Object.values(echo))}function runFreeStats(){let docs=allPatients.map(r=>r.data);const var1=document.getElementById('freeVar1').value,filter=document.getElementById('freeFilter').value;if(filter==='endo_compatible')docs=docs.filter(d=>isCompatible(d.endometriose));if(filter==='adeno_compatible')docs=docs.filter(d=>isCompatible(d.adenomyose));if(filter==='pudendal_compatible')docs=docs.filter(d=>isCompatible(d.pudendal));if(filter==='congestion_compatible')docs=docs.filter(d=>isCompatible(d.congestion));const stats={};docs.forEach(d=>{const v=d[var1],arr=Array.isArray(v)?v:[v];arr.forEach(x=>{const key=x&&String(x).trim()?String(x):'Non renseigné';stats[key]=(stats[key]||0)+1})});const labels=Object.keys(stats),data=Object.values(stats);drawChart('freeStatsChart','bar',labels,data);let html='<table><thead><tr><th>Valeur</th><th>Nombre</th></tr></thead><tbody>';labels.forEach((l,i)=>{html+=`<tr><td>${l}</td><td>${data[i]}</td></tr>`});html+='</tbody></table>';document.getElementById('freeStatsTable').innerHTML=html}function loadPatients(){updateHeader();db.collection('patients').where('practitionerId','==',currentPractitioner).onSnapshot(s=>{allPatients=[];s.forEach(doc=>allPatients.push({id:doc.id,data:doc.data()}));updateStats();runFreeStats()})}loadPatients();
</script></body></html>

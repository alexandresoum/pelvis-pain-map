<script>
const ADMIN_PIN = atob("MTYxMg==");
let rows = [];
let charts = {};
let lastRenderedTableRows = [];
let lastRenderedChartId = "customChart";

const FIXED_ECHO_OPTIONS = [
  "Endométriose",
  "Adénomyose",
  "Névralgie pudendale",
  "Congestion pelvienne",
  "OPK",
  "Normal",
  "Non contributif",
  "Mixte"
];

const PRACTITIONER_LABELS = {
  alexandre_soum: "Alexandre Soum",
  praticien_2: "Dr Jean-Marc Levaillant",
  praticien_3: "Anne-Laure Siraga"
};

function ageFromDob(dob) {
  if (!dob) return null;
  const b = new Date(dob);
  if (isNaN(b)) return null;
  const t = new Date();
  let a = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) a--;
  return a;
}

function drawChart(id, type, labels, data) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), {
    type,
    data: {
      labels,
      datasets: [{ data }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

function selectedPractitioners() {
  return [...document.querySelectorAll(".practitionerFilter:checked")].map(el => el.value);
}

function toggleAllPractitioners() {
  const checked = document.getElementById("p_all").checked;
  document.querySelectorAll(".practitionerFilter").forEach(el => el.checked = checked);
  recomputeAll();
}

function syncAllPractitioners() {
  const boxes = [...document.querySelectorAll(".practitionerFilter")];
  document.getElementById("p_all").checked = boxes.every(x => x.checked);
}

function getScopedDocs() {
  const selected = selectedPractitioners();
  return rows.map(r => r.data).filter(d => selected.includes(d.practitionerId));
}

function getFieldValuesFromDocs(field, docs) {
  const values = new Set();

  docs.forEach(d => {
    let v = d[field];
    if (field === "practitionerName" && !v) v = PRACTITIONER_LABELS[d.practitionerId] || d.practitionerId || "Non renseigné";

    if (Array.isArray(v)) {
      v.forEach(x => values.add(x || "Non renseigné"));
    } else {
      values.add(v && String(v).trim() ? String(v) : "Non renseigné");
    }
  });

  return [...values].sort((a,b) => String(a).localeCompare(String(b), "fr"));
}

function refreshFilterOptions(index) {
  const docs = getScopedDocs();
  const field = document.getElementById("filterField" + index).value;
  const valueSelect = document.getElementById("filterValue" + index);
  valueSelect.innerHTML = '<option value="">Choisir...</option>';

  if (!field) return;

  let values = [];
  if (field === "diagnostic_echo") {
    values = FIXED_ECHO_OPTIONS;
  } else if (["endometriose","adenomyose","pudendal","congestion"].includes(field)) {
    values = ["faible", "possible", "élevé"];
  } else {
    values = getFieldValuesFromDocs(field, docs);
  }

  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    valueSelect.appendChild(opt);
  });
}

function updateFixedStats() {
  const docs = getScopedDocs();
  const ages = docs.map(d => ageFromDob(d.dob)).filter(v => v !== null);

  document.getElementById("statPatients").textContent = docs.length;
  document.getElementById("statAge").textContent = ages.length ? (ages.reduce((a,b)=>a+b,0)/ages.length).toFixed(1) : "0";
  document.getElementById("statPain").textContent = (docs.length ? (docs.reduce((s,d)=>s+Number(d.pain||0),0)/docs.length).toFixed(1) : "0") + "/10";
  document.getElementById("statEchoes").textContent = docs.filter(d => Array.isArray(d.diagnostic_echo) && d.diagnostic_echo.length > 0).length;

  const diagCounts = {};
  FIXED_ECHO_OPTIONS.forEach(x => diagCounts[x] = 0);

  docs.forEach(d => {
    const arr = Array.isArray(d.diagnostic_echo) ? d.diagnostic_echo : [];
    arr.forEach(x => { diagCounts[x] = (diagCounts[x] || 0) + 1; });
  });

  const filteredEntries = Object.entries(diagCounts).filter(x => x[1] > 0);
  if (filteredEntries.length) {
    drawChart("diagnosticPieChart", "pie", filteredEntries.map(x => x[0]), filteredEntries.map(x => x[1]));
  } else {
    drawChart("diagnosticPieChart", "pie", ["Aucun diagnostic"], [1]);
  }
}

function normalizeFieldValue(doc, field) {
  let v = doc[field];
  if (field === "practitionerName") v = v || PRACTITIONER_LABELS[doc.practitionerId] || doc.practitionerId;
  return v;
}

function docMatchesFilter(doc, field, value) {
  if (!field || !value) return true;
  const v = normalizeFieldValue(doc, field);

  if (Array.isArray(v)) return v.includes(value);
  return (v && String(v).trim() ? String(v) : "Non renseigné") === value;
}

function flattenFieldValues(doc, field) {
  const v = normalizeFieldValue(doc, field);
  if (Array.isArray(v)) return v.length ? v.map(x => x && String(x).trim() ? String(x) : "Non renseigné") : ["Non renseigné"];
  return [v && String(v).trim() ? String(v) : "Non renseigné"];
}

function aggregateField(docs, field) {
  const counts = {};
  docs.forEach(d => {
    flattenFieldValues(d, field).forEach(key => {
      counts[key] = (counts[key] || 0) + 1;
    });
  });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function buildCrossTable(docs, field1, field2) {
  const rowSet = new Set();
  const colSet = new Set();
  const matrix = {};

  docs.forEach(d => {
    const vals1 = flattenFieldValues(d, field1);
    const vals2 = flattenFieldValues(d, field2);

    vals1.forEach(v1 => {
      rowSet.add(v1);
      if (!matrix[v1]) matrix[v1] = {};
      vals2.forEach(v2 => {
        colSet.add(v2);
        matrix[v1][v2] = (matrix[v1][v2] || 0) + 1;
      });
    });
  });

  const rows = [...rowSet].sort((a,b) => String(a).localeCompare(String(b), "fr"));
  const cols = [...colSet].sort((a,b) => String(a).localeCompare(String(b), "fr"));
  return { rows, cols, matrix };
}

function labelForField(field) {
  const labels = {
    practitionerName: "Praticien",
    diagnostic_echo: "Diagnostic écho",
    lesionPrimary: "Hypothèse lésionnelle",
    painTypePrimary: "Type de douleur",
    echoPrimary: "Orientation écho",
    topo: "Localisation",
    time: "Temporalité",
    digestif: "Digestif",
    contraceptionType: "Contraception",
    consultation: "Consultation antérieure",
    previousDiagnosis: "Diagnostic déjà évoqué",
    echoCertainty: "Certitude écho",
    phenotype: "Phénotype",
    endometriose: "Profil endométriose",
    adenomyose: "Profil adénomyose",
    pudendal: "Profil pudendal",
    congestion: "Profil congestion"
  };
  return labels[field] || field;
}

function formatEntries(entries, total, mode) {
  return entries.map(([label, count]) => {
    const pct = total > 0 ? (count * 100 / total) : 0;
    let displayLabel = label;
    if (mode === "percent") displayLabel = `${label} (${pct.toFixed(1)}%)`;
    if (mode === "both") displayLabel = `${label} (${count} | ${pct.toFixed(1)}%)`;
    return { label, count, pct, displayLabel };
  });
}

function runCustomAnalysis() {
  const docs = getScopedDocs();
  const mainVariable = document.getElementById("mainVariable").value;
  const secondaryVariable = document.getElementById("secondaryVariable").value;
  const filterField1 = document.getElementById("filterField1").value;
  const filterValue1 = document.getElementById("filterValue1").value;
  const filterField2 = document.getElementById("filterField2").value;
  const filterValue2 = document.getElementById("filterValue2").value;
  const chartType = document.getElementById("chartType").value;
  const displayMode = document.getElementById("displayMode").value;

  const filtered = docs.filter(d =>
    docMatchesFilter(d, filterField1, filterValue1) &&
    docMatchesFilter(d, filterField2, filterValue2)
  );

  const titleParts = ["Analyse : " + labelForField(mainVariable)];
  if (secondaryVariable) titleParts.push("croisé avec " + labelForField(secondaryVariable));
  if (filterField1 && filterValue1) titleParts.push(labelForField(filterField1) + " = " + filterValue1);
  if (filterField2 && filterValue2) titleParts.push(labelForField(filterField2) + " = " + filterValue2);
  document.getElementById("analysisTitle").textContent = titleParts.join(" | ");

  const canvas = document.getElementById("customChart");
  const tableWrap = document.getElementById("customTableWrap");
  lastRenderedTableRows = [];

  if (secondaryVariable) {
    const cross = buildCrossTable(filtered, mainVariable, secondaryVariable);
    canvas.style.display = "none";
    tableWrap.style.display = "block";

    const totalsByRow = {};
    cross.rows.forEach(r => {
      totalsByRow[r] = cross.cols.reduce((s,c) => s + (cross.matrix[r]?.[c] || 0), 0);
    });

    let html = `<table><thead><tr><th>${labelForField(mainVariable)} / ${labelForField(secondaryVariable)}</th>${cross.cols.map(c => `<th>${c}</th>`).join("")}<th>Total</th></tr></thead><tbody>`;
    const csvRows = [[labelForField(mainVariable) + " / " + labelForField(secondaryVariable), ...cross.cols, "Total"]];

    cross.rows.forEach(r => {
      const rowCells = [];
      html += `<tr><td>${r}</td>`;
      cross.cols.forEach(c => {
        const count = cross.matrix[r]?.[c] || 0;
        const pct = totalsByRow[r] > 0 ? (count * 100 / totalsByRow[r]) : 0;
        let cell = String(count);
        if (displayMode === "percent") cell = pct.toFixed(1) + "%";
        if (displayMode === "both") cell = count + " | " + pct.toFixed(1) + "%";
        html += `<td>${cell}</td>`;
        rowCells.push(cell);
      });
      html += `<td>${totalsByRow[r]}</td></tr>`;
      csvRows.push([r, ...rowCells, totalsByRow[r]]);
    });
    html += `</tbody></table>`;
    tableWrap.innerHTML = html;
    lastRenderedTableRows = csvRows;

    if (charts["customChart"]) {
      charts["customChart"].destroy();
      charts["customChart"] = null;
    }
    return;
  }

  const entriesRaw = aggregateField(filtered, mainVariable);
  const formatted = formatEntries(entriesRaw, filtered.length, displayMode);

  if (chartType === "table") {
    canvas.style.display = "none";
    tableWrap.style.display = "block";
    tableWrap.innerHTML = `
      <table>
        <thead><tr><th>Valeur</th><th>Nombre</th><th>%</th></tr></thead>
        <tbody>
          ${formatted.map(x => `<tr><td>${x.label}</td><td>${x.count}</td><td>${x.pct.toFixed(1)}%</td></tr>`).join("") || "<tr><td colspan='3'>Aucune donnée</td></tr>"}
        </tbody>
      </table>
    `;
    lastRenderedTableRows = [["Valeur","Nombre","%"], ...formatted.map(x => [x.label, x.count, x.pct.toFixed(1) + "%"])];
    if (charts["customChart"]) {
      charts["customChart"].destroy();
      charts["customChart"] = null;
    }
  } else {
    canvas.style.display = "block";
    tableWrap.style.display = "none";
    drawChart("customChart", chartType, formatted.map(x => x.displayLabel), formatted.map(x => x.count));
    lastRenderedTableRows = [["Valeur","Nombre","%"], ...formatted.map(x => [x.label, x.count, x.pct.toFixed(1) + "%"])];
  }
}

function exportAnonymousCSV() {
  const docs = getScopedDocs();
  const out = [[
    "praticien","age","intensite","lesion_suspectee","type_douleur","orientation_echo",
    "endometriose","adenomyose","pudendal","congestion","resultat_echo","echo_certitude"
  ]];

  docs.forEach(d => out.push([
    d.practitionerName || PRACTITIONER_LABELS[d.practitionerId] || d.practitionerId || "",
    ageFromDob(d.dob) ?? "",
    d.pain || "",
    d.lesionPrimary || "",
    d.painTypePrimary || "",
    d.echoPrimary || "",
    d.endometriose || "",
    d.adenomyose || "",
    d.pudendal || "",
    d.congestion || "",
    (d.diagnostic_echo || []).join(" | "),
    d.echoCertainty || ""
  ]));

  const csv = out.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pelvis_pain_map_anonyme.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function exportCurrentTableCSV() {
  if (!lastRenderedTableRows.length) return;
  const csv = lastRenderedTableRows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pelvis_pain_map_analyse.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function exportCurrentChartPNG() {
  const chart = charts[lastRenderedChartId];
  if (!chart) return;
  const link = document.createElement("a");
  link.href = chart.toBase64Image();
  link.download = "pelvis_pain_map_graphique.png";
  link.click();
}

function checkPin() {
  const pin = document.getElementById("pinInput").value;
  if (pin === ADMIN_PIN) {
    document.getElementById("pinOverlay").style.display = "none";
    document.getElementById("content").style.display = "block";
    loadRows();
  } else {
    document.getElementById("pinError").textContent = "Code incorrect.";
  }
}

function recomputeAll() {
  updateFixedStats();
  refreshFilterOptions("1");
  refreshFilterOptions("2");
  runCustomAnalysis();
}

function loadRows() {
  db.collection("patients").onSnapshot(s => {
    rows = [];
    s.forEach(doc => rows.push({ id: doc.id, data: doc.data() }));
    recomputeAll();
  });
}

document.addEventListener("keydown", e => {
  if (document.getElementById("pinOverlay").style.display !== "none" && e.key === "Enter") checkPin();
});
</script>
</body>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.container{padding:20px}
.block{background:white;padding:15px;border-radius:12px;margin-bottom:20px}
.kpis{display:flex;gap:15px}
.kpi{flex:1;background:white;padding:15px;border-radius:10px;text-align:center}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #eee}
.prBadge{background:#eef2ff;padding:5px 10px;border-radius:20px;margin:3px;display:inline-block}
</style>
</head>

<body>

<div class="container">

<h1>Dashboard scientifique</h1>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><h2 id="kpiTotal">0</h2><p>Dossiers</p></div>
  <div class="kpi"><h2 id="kpiPain">0</h2><p>Douleur</p></div>
  <div class="kpi"><h2 id="kpiAUC">0</h2><p>AUC</p></div>
</div>

<!-- PRACTITIONERS -->
<div class="block">
<input id="search" placeholder="Recherche" oninput="renderPr()">
<div id="selected"></div>
<div id="results"></div>
<button onclick="selectAll()">Tout</button>
<button onclick="clearAll()">Aucun</button>
</div>

<!-- METRICS -->
<div class="block">
<h3>Métriques IA</h3>
<div id="metrics"></div>
</div>

<!-- TABLE -->
<div class="block">
<h3>Comparaison praticiens</h3>
<div id="table"></div>
</div>

<button onclick="exportPDF()">Exporter PDF</button>

</div>

<script>

// STATE
let rows=[];
let practitionerMap={};
let PRACTITIONERS=[];
let selected=new Set();

// INIT
async function init(){
  await loadPractitioners();
  loadPatients();
}

// PRACTITIONERS
async function loadPractitioners(){
  const snap=await db.collection("pratitioners").get();
  snap.forEach(doc=>{
    practitionerMap[doc.id]=doc.data().name||doc.id;
  });
  PRACTITIONERS=Object.entries(practitionerMap).map(([id,name])=>({id,name}));
  selected=new Set(PRACTITIONERS.map(p=>p.id));
  renderPr();
}

// PATIENTS
function loadPatients(){
  db.collection("patients").onSnapshot(s=>{
    rows=[];
    s.forEach(d=>rows.push(d.data()));
    updateAll();
  });
}

// FILTER
function getDocs(){
  return rows.filter(d=>selected.has(d.practitionerId));
}

// ==========================
// 🧠 METRICS
// ==========================

function computeMetrics(docs){

  let TP=0,FP=0,TN=0,FN=0;

  docs.forEach(d=>{
    const ai = d.hypothesisPrimary;
    const echo = (d.diagnostic_echo||[])[0];

    if(ai && echo){
      if(ai===echo) TP++;
      else FP++;
    } else if(!ai && echo){
      FN++;
    } else {
      TN++;
    }
  });

  const sens = TP/(TP+FN)||0;
  const spec = TN/(TN+FP)||0;
  const ppv = TP/(TP+FP)||0;
  const npv = TN/(TN+FN)||0;

  return {TP,FP,TN,FN,sens,spec,ppv,npv};
}

// ==========================
// 📈 ROC + AUC (simplifié)
// ==========================

function computeAUC(docs){

  let scores=[];

  docs.forEach(d=>{
    const p = Number(d.hypothesisPrimaryPct||0);
    const y = d.hypothesisPrimary === (d.diagnostic_echo||[])[0] ? 1 : 0;
    scores.push({p,y});
  });

  scores.sort((a,b)=>b.p-a.p);

  let tp=0,fp=0;
  let prevP=null;
  let auc=0;

  scores.forEach(s=>{
    if(s.y) tp++;
    else fp++;

    if(prevP!==null){
      auc += tp*fp;
    }
    prevP=s.p;
  });

  return (auc/(scores.length*scores.length))||0;
}

// ==========================
// UI
// ==========================

function updateAll(){

  const docs=getDocs();

  // KPIs
  kpiTotal.innerText=docs.length;
  kpiPain.innerText=(docs.reduce((s,d)=>s+Number(d.pain||0),0)/docs.length||0).toFixed(1);

  const auc=computeAUC(docs);
  kpiAUC.innerText=auc.toFixed(2);

  // metrics
  const m=computeMetrics(docs);

  metrics.innerHTML=`
    Sensibilité: ${m.sens.toFixed(2)}<br>
    Spécificité: ${m.spec.toFixed(2)}<br>
    VPP: ${m.ppv.toFixed(2)}<br>
    VPN: ${m.npv.toFixed(2)}<br>
    TP:${m.TP} FP:${m.FP} TN:${m.TN} FN:${m.FN}
  `;

  renderTable(docs);
}

// ==========================
// TABLE
// ==========================

function renderTable(docs){

  const map={};

  docs.forEach(d=>{
    if(!map[d.practitionerId]) map[d.practitionerId]=[];
    map[d.practitionerId].push(d);
  });

  table.innerHTML=`
    <table>
    <tr><th>Praticien</th><th>Dossiers</th><th>Douleur</th></tr>
    ${
      Object.entries(map).map(([id,list])=>`
        <tr>
          <td>${practitionerMap[id]}</td>
          <td>${list.length}</td>
          <td>${(list.reduce((s,d)=>s+Number(d.pain||0),0)/list.length).toFixed(1)}</td>
        </tr>
      `).join("")
    }
    </table>
  `;
}

// ==========================
// PRACTITIONERS UI
// ==========================

function renderPr(){

  const q=search.value.toLowerCase();

  selected.innerHTML=[...selected].map(id=>`
    <span class="prBadge">${practitionerMap[id]}</span>
  `).join("");

  results.innerHTML=PRACTITIONERS
    .filter(p=>p.name.toLowerCase().includes(q))
    .map(p=>`
      <div onclick="togglePr('${p.id}')">
        ${p.name}
      </div>
    `).join("");
}

function togglePr(id){
  selected.has(id)?selected.delete(id):selected.add(id);
  renderPr();
  updateAll();
}

function selectAll(){
  selected=new Set(PRACTITIONERS.map(p=>p.id));
  renderPr();
  updateAll();
}

function clearAll(){
  selected.clear();
  renderPr();
  updateAll();
}

// ==========================
// PDF
// ==========================

function exportPDF(){
  html2pdf().from(document.body).save("report.pdf");
}

// INIT
init();

</script>

</body>
</html>
